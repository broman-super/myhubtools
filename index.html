<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REYNAHUB | SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --side: #000000; --red: #ff0000; --border: #eeeeee; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Inter', sans-serif; display: flex; overflow: hidden; background: var(--bg); }

        /* SIDEBAR MINIMALIST PRO */
        aside {
            width: 65px; min-width: 65px; background: var(--side); 
            display: flex; flex-direction: column; align-items: center; 
            padding: 25px 0; z-index: 100;
        }

        .logo-box { color: var(--red); font-weight: 900; font-size: 1.4rem; cursor: pointer; margin-bottom: 30px; transition: 0.3s; }
        .logo-box:hover { transform: scale(1.1); }

        .nav-wrapper { flex: 1; display: flex; flex-direction: column; gap: 20px; align-items: center; width: 100%; }
        
        /* Dropdown Nav */
        .nav-container { position: relative; width: 100%; display: flex; justify-content: center; }
        .nav-item {
            width: 42px; height: 42px; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; cursor: pointer; transition: 0.2s; color: #555; background: transparent; border: none;
        }
        .nav-item svg { width: 22px; height: 22px; fill: currentColor; }
        .nav-item:hover, .nav-item.active { color: #fff; background: #1a1a1a; }
        .nav-item.active { color: var(--red); }

        /* Dropdown Menu Style */
        .dropdown-menu {
            position: absolute; left: 75px; top: 0; background: #000;
            border: 1px solid #333; border-radius: 8px; width: 180px;
            display: none; flex-direction: column; padding: 10px; box-shadow: 10px 10px 30px rgba(0,0,0,0.5);
        }
        .nav-container:hover .dropdown-menu { display: flex; }
        .dropdown-item {
            color: #888; padding: 10px; font-size: 0.8rem; text-decoration: none;
            border-radius: 4px; transition: 0.2s; cursor: pointer; text-align: left;
        }
        .dropdown-item:hover { color: #fff; background: #222; }
        .dropdown-label { font-size: 0.6rem; color: #444; text-transform: uppercase; letter-spacing: 1px; padding: 5px 10px; }

        /* BOTTOM NAV */
        .bottom-nav { margin-top: auto; padding-bottom: 10px; }

        /* MAIN AREA */
        main { flex: 1; height: 100vh; position: relative; display: flex; flex-direction: column; overflow-y: auto; background: #fff; }

        /* DASHBOARD ELEMENTS */
        #dashboard { display: block; width: 100%; }
        .banner {
            width: 100%; height: 220px; background: var(--side); color: white;
            display: flex; flex-direction: column; justify-content: center;
            padding: 0 60px; box-sizing: border-box; position: relative; overflow: hidden;
        }
        .banner h1 { font-size: 2.5rem; font-weight: 900; margin: 0; letter-spacing: -2px; z-index: 2; }
        .banner p { font-size: 0.8rem; color: #555; margin-top: 5px; text-transform: uppercase; letter-spacing: 2px; }

        .content-padding { padding: 40px 60px; }
        .group-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; font-size: 0.7rem; font-weight: 700; color: #bbb; letter-spacing: 2px; }
        .group-header .line { flex: 1; height: 1px; background: #eee; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; margin-bottom: 40px; }
        .card { border: 1px solid var(--border); padding: 25px; cursor: pointer; transition: 0.3s; position: relative; }
        .card:hover { border-color: #000; background: #fafafa; }
        .card h3 { margin: 0; font-size: 0.9rem; font-weight: 900; text-transform: uppercase; }
        .card p { margin: 5px 0 0; font-size: 0.75rem; color: #888; line-height: 1.5; }

        /* IFRAME FULLSCREEN */
        #frame-container { display: none; width: 100%; height: 100%; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
    </style>
</head>
<body>

    <aside>
        <div class="logo-box" onclick="goHome()">R.</div>
        
        <div class="nav-wrapper">
            <div class="nav-item active" id="btn-home" onclick="goHome()" title="Home">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            </div>

            <div class="nav-container">
                <div class="nav-item" title="Tools Menu">
                    <svg viewBox="0 0 24 24"><path d="M4 8h4V4H4v4zm6 12h4v-4h-4v4zm-6 0h4v-4H4v4zm0-6h4v-4H4v4zm6 0h4v-4h-4v4zm6-10v4h4V4h-4zm-6 4h4V4h-4v4zm6 6h4v-4h-4v4zm0 6h4v-4h-4v4z"/></svg>
                </div>
                <div class="dropdown-menu">
                    <span class="dropdown-label">Production</span>
                    <div class="dropdown-item" onclick="openTool('https://script.google.com/macros/s/AKfycbwe-6KNZWNPUtamF6UGwidijBKo2s2wRZNFLjDBXgkjClMsrIfTKqX-UvJyvYllj7X3/exec', this)">Team Planner</div>
                    
                    <span class="dropdown-label" style="margin-top:10px;">Utility</span>
                    <div class="dropdown-item" onclick="openTool('https://script.google.com/macros/s/AKfycbwuQq-fW0SgJUuRwrKUZRPurcZ3oAvd7ZEgv-R3_hcyMoPubFjVueh1sVpOVvfiTrDMQw/exec', this)">Resi Generator</div>
                </div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item" onclick="openTool('about/', this)" title="About System">
                <svg viewBox="0 0 24 24"><path d="M11 18h2v-2h-2v2zm1-16C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm0-14c-2.21 0-4 1.79-4 4h2c0-1.1.9-2 2-2s2 .9 2 2c0 2-3 1.75-3 5h2c0-2.25 3-2.5 3-5 0-2.21-1.79-4-4-4z"/></svg>
            </div>
        </div>
    </aside>

    <main>
        <div id="dashboard">
            <section class="banner">
                <p>Operational Intelligence</p>
                <h1>REYNAHUB_SYSTEM</h1>
            </section>

            <div class="content-padding">
                <div class="group-header"><span>01 PRODUCTION</span><div class="line"></div></div>
                <div class="grid">
                    <div class="card" onclick="openTool('https://script.google.com/macros/s/AKfycbwe-6KNZWNPUtamF6UGwidijBKo2s2wRZNFLjDBXgkjClMsrIfTKqX-UvJyvYllj7X3/exec', null)">
                        <h3>TEAM PLANNER</h3>
                        <p>Google Sheets integrated task manager.</p>
                    </div>
                </div>

                <div class="group-header"><span>02 UTILITY</span><div class="line"></div></div>
                <div class="grid">
                    <div class="card" onclick="openTool('https://script.google.com/macros/s/AKfycbwuQq-fW0SgJUuRwrKUZRPurcZ3oAvd7ZEgv-R3_hcyMoPubFjVueh1sVpOVvfiTrDMQw/exec', null)">
                        <h3>RESI GENERATOR</h3>
                        <p>Universal tool for automated operational receipts.</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="frame-container">
            <iframe id="main-frame" src=""></iframe>
        </div>
    </main>

    <script>
        const db = document.getElementById('dashboard');
        const cont = document.getElementById('frame-container');
        const frame = document.getElementById('main-frame');
        const btnHome = document.getElementById('btn-home');

        function openTool(url, el) {
            db.style.display = 'none';
            cont.style.display = 'block';
            frame.src = url;
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if(el && el.classList.contains('nav-item')) el.classList.add('active');
        }

        function goHome() {
            db.style.display = 'block';
            cont.style.display = 'none';
            frame.src = '';
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            btnHome.classList.add('active');
        }
    </script>
</body>
</html>
