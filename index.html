<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReynaHub | Digital Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --sidebar-bg: #111111;
            --text-main: #111111;
            --text-muted: #666666;
            --accent-red: #e63946;
            --border: #eeeeee;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: 'Inter', sans-serif; background: var(--bg); 
            color: var(--text-main); display: flex; overflow: hidden;
        }

        /* SIDEBAR (Kiri) */
        aside {
            width: 240px; background: var(--sidebar-bg);
            color: white; display: flex; flex-direction: column;
            padding: 30px 20px; transition: 0.3s;
        }

        .logo { 
            font-weight: 700; font-size: 1.4rem; letter-spacing: -1px; 
            margin-bottom: 50px; cursor: pointer;
        }
        .logo span { color: var(--accent-red); }

        .nav-group { margin-bottom: 30px; }
        .nav-label { 
            font-size: 0.7rem; text-transform: uppercase; 
            letter-spacing: 1px; color: #555; margin-bottom: 15px; display: block;
        }

        .nav-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 15px; border-radius: 6px;
            color: #ccc; text-decoration: none; font-size: 0.9rem;
            margin-bottom: 5px; cursor: pointer; transition: 0.2s;
        }
        .nav-item:hover { background: #222; color: white; }
        .nav-item.active { background: var(--accent-red); color: white; font-weight: 600; }

        /* MAIN CONTENT AREA */
        main { flex: 1; display: flex; flex-direction: column; position: relative; }

        /* Welcome Dashboard */
        #dashboard { 
            padding: 50px; overflow-y: auto; width: 100%; box-sizing: border-box; 
        }
        h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 40px; letter-spacing: -1px; }

        .group-container { margin-bottom: 50px; }
        .group-header { 
            font-weight: 700; border-bottom: 2px solid var(--text-main); 
            padding-bottom: 10px; margin-bottom: 25px; display: flex; justify-content: space-between;
        }

        .grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; 
        }
        .tool-card {
            border: 1px solid var(--border); padding: 25px; border-radius: 2px;
            cursor: pointer; transition: 0.3s; background: white;
        }
        .tool-card:hover { border-color: var(--accent-red); box-shadow: 10px 10px 0px rgba(0,0,0,0.05); }
        .tool-card h3 { margin: 0; font-size: 1.1rem; }
        .tool-card p { color: var(--text-muted); font-size: 0.8rem; margin-top: 8px; line-height: 1.5; }

        /* Iframe Frame */
        #iframe-container { display: none; width: 100%; height: 100%; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Footer inside Sidebar */
        .sidebar-footer { margin-top: auto; font-size: 0.7rem; color: #444; }
    </style>
</head>
<body>

    <aside>
        <div class="logo" onclick="goHome()">REYNA<span>HUB.</span></div>
        
        <div class="nav-group">
            <span class="nav-label">Productivity</span>
            <div class="nav-item" onclick="openTool('https://script.google.com/macros/s/AKfycbwe-6KNZWNPUtamF6UGwidijBKo2s2wRZNFLjDBXgkjClMsrIfTKqX-UvJyvYllj7X3/exec', this)">
                <span>📅</span> Team Planner
            </div>
        </div>

        <div class="nav-group">
            <span class="nav-label">Utility</span>
            <div class="nav-item" onclick="openTool('https://script.google.com/macros/s/AKfycbymirPsiqmEypDmRAvDpai_yecL5RIt4kKvMx3yBn74TOiu9RZQ35i5KI-NPg0mQYXbAQ/exec', this)">
                <span>🛠️</span> Universal Tool
            </div>
        </div>

        <div class="sidebar-footer">
            &copy; 2024 SYSTEM V.1.0
        </div>
    </aside>

    <main>
        <div id="dashboard">
            <h1>Workspace Dashboard</h1>

            <div class="group-container">
                <div class="group-header"><span>PRODUKTIVITAS</span> <span>/01</span></div>
                <div class="grid">
                    <div class="tool-card" onclick="openTool('https://script.google.com/macros/s/AKfycbwe-6KNZWNPUtamF6UGwidijBKo2s2wRZNFLjDBXgkjClMsrIfTKqX-UvJyvYllj7X3/exec', null)">
                        <h3>Team Planner</h3>
                        <p>Manajemen tugas tim terintegrasi dengan Google Sheets.</p>
                    </div>
                </div>
            </div>

            <div class="group-container">
                <div class="group-header"><span>UTILITY & GENERAL</span> <span>/02</span></div>
                <div class="grid">
                    <div class="tool-card" onclick="openTool('https://script.google.com/macros/s/AKfycbymirPsiqmEypDmRAvDpai_yecL5RIt4kKvMx3yBn74TOiu9RZQ35i5KI-NPg0mQYXbAQ/exec', null)">
                        <h3>Universal Tool</h3>
                        <p>Kumpulan fungsi pembantu untuk efisiensi kerja harian.</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="iframe-container">
            <iframe id="main-frame" src=""></iframe>
        </div>
    </main>

    <script>
        const dashboard = document.getElementById('dashboard');
        const iframeContainer = document.getElementById('iframe-container');
        const mainFrame = document.getElementById('main-frame');

        function openTool(url, el) {
            dashboard.style.display = 'none';
            iframeContainer.style.display = 'block';
            mainFrame.src = url;

            // Update active state sidebar
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            if(el) el.classList.add('active');
        }

        function goHome() {
            dashboard.style.display = 'block';
            iframeContainer.style.display = 'none';
            mainFrame.src = '';
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
        }
    </script>
</body>
</html>
