<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REYNAHUB | DIGITAL SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --side: #000000; --red: #ff0000; --gray: #f4f4f4; --border: #eeeeee; }
        
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Inter', sans-serif; display: flex; overflow: hidden; background: var(--bg); }

        /* SIDEBAR TETAP TIPIS */
        aside {
            width: 60px; min-width: 60px; background: var(--side); 
            display: flex; flex-direction: column; align-items: center; 
            padding: 20px 0; gap: 20px; z-index: 100;
        }
        .logo-box { color: var(--red); font-weight: 900; font-size: 1.4rem; cursor: pointer; margin-bottom: 10px; }
        .nav-item {
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            border-radius: 4px; cursor: pointer; transition: 0.2s; color: #444;
        }
        .nav-item svg { width: 20px; height: 20px; fill: currentColor; }
        .nav-item:hover { color: #fff; background: #111; }
        .nav-item.active { color: #fff; background: var(--red); }

        /* MAIN AREA */
        main { flex: 1; height: 100vh; position: relative; display: flex; flex-direction: column; overflow-y: auto; background: #fff; }

        /* DASHBOARD CONTENT */
        #dashboard { display: block; width: 100%; }

        /* BANNER SECTION */
        .banner {
            width: 100%; height: 220px; background: var(--side); /* Warna dasar hitam */
            /* TAMBAHKAN BARIS DI BAWAH INI */
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://www.vecteezy.com/free-vector/minimal-banner');
            background-size: cover;
            background-position: center;
            /* -------------------------- */
            color: white;
            display: flex; flex-direction: column; justify-content: center;
            padding: 0 60px; box-sizing: border-box; position: relative; overflow: hidden;
        }
        .banner::before {
            content: "SYSTEM V.1"; position: absolute; right: -20px; bottom: -20px;
            font-size: 8rem; font-weight: 900; opacity: 0.05; font-style: italic;
        }
        .banner h1 { font-size: 2.5rem; font-weight: 900; margin: 0; letter-spacing: -2px; }
        .banner p { font-size: 0.9rem; color: #666; margin-top: 5px; text-transform: uppercase; letter-spacing: 2px; }
        .red-line { width: 50px; height: 4px; background: var(--red); margin-top: 15px; }

        /* GROUPING AREA */
        .content-padding { padding: 40px 60px; }
        .group-section { margin-bottom: 40px; }
        .group-header { 
            display: flex; align-items: center; gap: 15px; margin-bottom: 20px;
            font-size: 0.75rem; font-weight: 700; color: #bbb; letter-spacing: 2px;
        }
        .group-header .line { flex: 1; height: 1px; background: #eee; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 15px; }
        
        /* CARD DESIGN */
        .card { 
            border: 1px solid var(--border); padding: 25px; cursor: pointer; transition: 0.3s;
            display: flex; flex-direction: column; gap: 10px; position: relative;
        }
        .card::after { content: ""; position: absolute; bottom: 0; left: 0; width: 0; height: 3px; background: var(--red); transition: 0.3s; }
        .card:hover { background: #fafafa; border-color: #000; }
        .card:hover::after { width: 100%; }
        
        .card h3 { margin: 0; font-size: 1rem; font-weight: 900; letter-spacing: -0.5px; }
        .card p { margin: 0; font-size: 0.8rem; color: #888; line-height: 1.5; }
        .card-icon { width: 30px; height: 30px; fill: #000; margin-bottom: 5px; }

        /* FULL FRAME AREA */
        #frame-container { display: none; width: 100%; height: 100%; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
    </style>
</head>
<body>

    <aside>
        <div class="logo-box" onclick="goHome()">R.</div>
        <div class="nav-item active" id="btn-home" onclick="goHome()">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        </div>
        <div style="width:20px; height:1px; background:#222;"></div>
        <div class="nav-item" onclick="openTool('https://script.google.com/macros/s/AKfycbwe-6KNZWNPUtamF6UGwidijBKo2s2wRZNFLjDBXgkjClMsrIfTKqX-UvJyvYllj7X3/exec', this)">
            <svg viewBox="0 0 24 24"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1s-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
        </div>
        <div class="nav-item" onclick="openTool('https://script.google.com/macros/s/AKfycbwuQq-fW0SgJUuRwrKUZRPurcZ3oAvd7ZEgv-R3_hcyMoPubFjVueh1sVpOVvfiTrDMQw/exec', this)">
            <svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.5 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>
        </div>
    </aside>

    <main>
        <div id="dashboard">
            <section class="banner">
                <p>Digital Intelligence Workspace</p>
                <h1>REYNAHUB_SYSTEM</h1>
                <div class="red-line"></div>
            </section>

            <div class="content-padding">
                <div class="group-section">
                    <div class="group-header">
                        <span>01 PRODUCTION TOOLS</span>
                        <div class="line"></div>
                    </div>
                    <div class="grid">
                        <div class="card" onclick="openTool('https://script.google.com/macros/s/AKfycbwe-6KNZWNPUtamF6UGwidijBKo2s2wRZNFLjDBXgkjClMsrIfTKqX-UvJyvYllj7X3/exec', null)">
                            <svg class="card-icon" viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
                            <h3>TEAM PLANNER</h3>
                            <p>Real-time task management system integrated with Google Sheets.</p>
                        </div>
                    </div>
                </div>

                <div class="group-section">
                    <div class="group-header">
                        <span>02 UTILITY & GENERAL</span>
                        <div class="line"></div>
                    </div>
                    <div class="grid">
                        <div class="card" onclick="openTool('https://script.google.com/macros/s/AKfycbwuQq-fW0SgJUuRwrKUZRPurcZ3oAvd7ZEgv-R3_hcyMoPubFjVueh1sVpOVvfiTrDMQw/exec', null)">
                            <svg class="card-icon" viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.5 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>
                            <h3>UNIVERSAL TOOL</h3>
                            <p>All-in-one utility script for daily operational efficiency.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="frame-container">
            <iframe id="main-frame" src=""></iframe>
        </div>
    </main>

    <script>
        const db = document.getElementById('dashboard');
        const cont = document.getElementById('frame-container');
        const frame = document.getElementById('main-frame');
        const btnHome = document.getElementById('btn-home');

        function openTool(url, el) {
            db.style.display = 'none';
            cont.style.display = 'block';
            frame.src = url;
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if(el) el.classList.add('active');
        }

        function goHome() {
            db.style.display = 'block';
            cont.style.display = 'none';
            frame.src = '';
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            btnHome.classList.add('active');
        }
    </script>
</body>
</html>
