<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REYNAHUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --side: #000000; --red: #ff0000; --border: #eeeeee; }
        
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; display: flex; overflow: hidden; background: var(--bg); }

        /* SIDEBAR SUPER TIPIS */
        aside {
            width: 70px; background: var(--side); display: flex; flex-direction: column;
            align-items: center; padding: 25px 0; gap: 30px; z-index: 100;
        }

        .logo-box { color: var(--red); font-weight: 700; font-size: 1.2rem; cursor: pointer; margin-bottom: 20px; }

        .nav-item {
            width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; cursor: pointer; transition: 0.2s; color: #666;
        }
        .nav-item svg { width: 22px; height: 22px; fill: currentColor; }
        .nav-item:hover { color: #fff; background: #222; }
        .nav-item.active { color: #fff; background: var(--red); }

        /* MAIN CONTENT */
        main { flex: 1; display: flex; flex-direction: column; height: 100vh; position: relative; }

        /* DASHBOARD */
        #dashboard { padding: 40px; overflow-y: auto; flex: 1; }
        .title { font-size: 1.5rem; font-weight: 700; letter-spacing: -1px; margin-bottom: 40px; border-bottom: 2px solid #000; display: inline-block; padding-bottom: 5px; }
        
        .section-label { font-size: 0.7rem; font-weight: 700; color: #999; letter-spacing: 2px; margin-bottom: 20px; display: block; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; margin-bottom: 40px; }
        .card { 
            border: 1px solid var(--border); padding: 20px; cursor: pointer; transition: 0.2s; 
            display: flex; flex-direction: column; gap: 10px;
        }
        .card:hover { border-color: #000; background: #fafafa; }
        .card h3 { margin: 0; font-size: 0.9rem; font-weight: 700; text-transform: uppercase; }
        .card p { margin: 0; font-size: 0.75rem; color: #888; line-height: 1.4; }

        /* FULL FRAME AREA */
        #frame-container { display: none; width: 100%; height: 100%; background: #fff; }
        iframe { width: 100%; height: 100%; border: none; outline: none; }

        /* Utility */
        .sep { width: 30px; height: 1px; background: #333; }
    </style>
</head>
<body>

    <aside>
        <div class="logo-box" onclick="goHome()">R.</div>
        
        <div class="nav-item active" onclick="goHome()" title="Home">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        </div>

        <div class="sep"></div>

        <div class="nav-item" onclick="openTool('https://script.google.com/macros/s/AKfycbwe-6KNZWNPUtamF6UGwidijBKo2s2wRZNFLjDBXgkjClMsrIfTKqX-UvJyvYllj7X3/exec', this)" title="Tasklist">
            <svg viewBox="0 0 24 24"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1s-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
        </div>

        <div class="nav-item" onclick="openTool('https://script.google.com/macros/s/AKfycbymirPsiqmEypDmRAvDpai_yecL5RIt4kKvMx3yBn74TOiu9RZQ35i5KI-NPg0mQYXbAQ/exec', this)" title="Universal Tool">
            <svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.5 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>
        </div>
    </aside>

    <main>
        <div id="dashboard">
            <div class="title">HUB_SYSTEM_V1</div>

            <span class="section-label">01 / PRODUCTION</span>
            <div class="grid">
                <div class="card" onclick="openTool('https://script.google.com/macros/s/AKfycbwe-6KNZWNPUtamF6UGwidijBKo2s2wRZNFLjDBXgkjClMsrIfTKqX-UvJyvYllj7X3/exec', null)">
                    <h3>Team Planner</h3>
                    <p>Google Sheets integrated task manager.</p>
                </div>
            </div>

            <span class="section-label">02 / UTILITIES</span>
            <div class="grid">
                <div class="card" onclick="openTool('https://script.google.com/macros/s/AKfycbymirPsiqmEypDmRAvDpai_yecL5RIt4kKvMx3yBn74TOiu9RZQ35i5KI-NPg0mQYXbAQ/exec', null)">
                    <h3>Universal Tool</h3>
                    <p>Multi-purpose functional script utility.</p>
                </div>
            </div>
        </div>

        <div id="frame-container">
            <iframe id="main-frame" src=""></iframe>
        </div>
    </main>

    <script>
        const db = document.getElementById('dashboard');
        const cont = document.getElementById('frame-container');
        const frame = document.getElementById('main-frame');

        function openTool(url, el) {
            db.style.display = 'none';
            cont.style.display = 'block';
            frame.src = url;
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if(el) el.classList.add('active');
        }

        function goHome() {
            db.style.display = 'block';
            cont.style.display = 'none';
            frame.src = '';
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.querySelectorAll('.nav-item')[0].classList.add('active');
        }
    </script>
</body>
</html>
