<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>REYNAHUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #ffffff; --side: #000000; --red: #ff0000; 
            --nav-size: 50px; 
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            margin: 0; padding: 0; height: 100dvh; width: 100%; 
            font-family: 'Inter', sans-serif; display: flex; 
            overflow: hidden; background: var(--bg); 
        }

        /* --- SIDEBAR CUSTOM --- */
        aside {
            width: var(--nav-size); min-width: var(--nav-size); background: var(--side); 
            display: flex; flex-direction: column; align-items: center; padding: 15px 0; z-index: 100;
        }
        .logo-box { color: var(--red); font-weight: 900; font-size: 1.1rem; cursor: pointer; margin-bottom: 20px; }
        
        .nav-wrapper { flex: 1; display: flex; flex-direction: column; gap: 15px; align-items: center; width: 100%; }
        .nav-bottom { margin-top: auto; padding-bottom: 10px; } /* Posisi About di paling bawah */

        .nav-item {
            width: 35px; height: 35px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; cursor: pointer; transition: 0.2s; color: #444; background: none; border: none;
        }
        .nav-item svg { width: 18px; height: 18px; fill: currentColor; }
        .nav-item:hover, .nav-item.active { color: #fff; background: #1a1a1a; }
        .nav-item.active { color: var(--red); }

        /* --- MAIN AREA --- */
        main { flex: 1; position: relative; height: 100dvh; overflow: hidden; }

        #dashboard { width: 100%; height: 100%; overflow-y: auto; scroll-behavior: smooth; }
        .banner {
            width: 100%; height: 180px; background: var(--side); color: white;
            display: flex; flex-direction: column; justify-content: center; padding: 0 30px;
        }
        .banner h1 { font-size: 1.8rem; font-weight: 900; margin: 0; letter-spacing: -1px; }
        .banner p { font-size: 0.6rem; color: #555; margin-top: 5px; letter-spacing: 2px; text-transform: uppercase; }

        .content-padding { padding: 30px; padding-bottom: 100px; }
        
        /* Style untuk Filter */
        .group-section { display: block; }
        .group-header { display: flex; align-items: center; gap: 10px; margin: 25px 0 10px; font-size: 0.6rem; font-weight: 700; color: #bbb; letter-spacing: 1.5px; }
        .group-header .line { flex: 1; height: 1px; background: #eee; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
        .card { border: 1px solid #eee; padding: 20px; cursor: pointer; transition: 0.2s; background: #fff; }
        .card:hover { border-color: #000; transform: translateY(-2px); }
        .card h3 { margin: 0; font-size: 0.8rem; font-weight: 900; text-transform: uppercase; }
        .card p { margin: 5px 0 0; font-size: 0.7rem; color: #888; line-height: 1.4; }

        /* --- FRAME CONTAINER --- */
        #frame-container { 
            display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: #fff; z-index: 10;
        }
        iframe { width: 100%; height: 100%; border: none; display: block; }

        /* --- MOBILE --- */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            aside {
                width: 100%; height: var(--nav-size); min-width: auto; 
                flex-direction: row; padding: 0 10px; position: fixed; bottom: 0; left: 0;
                border-top: 1px solid #1a1a1a;
                height: calc(var(--nav-size) + env(safe-area-inset-bottom));
                padding-bottom: env(safe-area-inset-bottom);
            }
            .logo-box { display: none; }
            .nav-wrapper { flex-direction: row; justify-content: space-around; width: 100%; }
            .nav-bottom { margin-top: 0; padding-bottom: 0; display: flex; align-items: center; }
            
            #frame-container, #dashboard { 
                bottom: calc(var(--nav-size) + env(safe-area-inset-bottom));
                height: auto; 
            }
        }
    </style>
</head>
<body>

    <aside>
        <div class="logo-box" onclick="goHome()">R.</div>
        
        <div class="nav-wrapper">
            <div class="nav-item active" id="nav-home" onclick="filterGroup('all', this)" title="Dashboard">
                <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
            </div>
            <div class="nav-item" onclick="filterGroup('prod', this)" title="Productive">
                <svg viewBox="0 0 24 24"><path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z"/></svg>
            </div>
            <div class="nav-item" onclick="filterGroup('util', this)" title="Universal Tools">
                <svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.5 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>
            </div>
        </div>

        <div class="nav-bottom">
            <div class="nav-item" onclick="openTool('about/', this)" title="About">
                <svg viewBox="0 0 24 24"><path d="M11 18h2v-2h-2v2zm1-16C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm0-14c-2.21 0-4 1.79-4 4h2c0-1.1.9-2 2-2s2 .9 2 2c0 2-3 1.75-3 5h2c0-2.25 3-2.5 3-5 0-2.21-1.79-4-4-4z"/></svg>
            </div>
        </div>
    </aside>

    <main>
        <div id="dashboard">
            <section class="banner">
                <p>System Operating Hub</p>
                <h1>REYNAHUB_SYS</h1>
            </section>
            
            <div class="content-padding">
                <div id="section-prod" class="group-section">
                    <div class="group-header"><span>01 / PRODUCTIVE</span><div class="line"></div></div>
                    <div class="grid">
                        <div class="card" onclick="openTool('https://script.google.com/macros/s/AKfycbwe-6KNZWNPUtamF6UGwidijBKo2s2wRZNFLjDBXgkjClMsrIfTKqX-UvJyvYllj7X3/exec', null)">
                            <h3>TEAM PLANNER</h3>
                            <p>Manajemen tugas tim real-time.</p>
                        </div>
                        <div class="card" onclick="openTool('Productive/Analytic.html', null)">
                            <h3>ANALYTIC DASHBOARD</h3>
                            <p>Visualisasi data dan performa sistem.</p>
                        </div>
                    </div>
                </div>

                <div id="section-util" class="group-section">
                    <div class="group-header"><span>02 / UNIVERSAL TOOLS</span><div class="line"></div></div>
                    <div class="grid">
                        <div class="card" onclick="openTool('https://script.google.com/macros/s/AKfycbwuQq-fW0SgJUuRwrKUZRPurcZ3oAvd7ZEgv-R3_hcyMoPubFjVueh1sVpOVvfiTrDMQw/exec', null)">
                            <h3>RESI GENERATOR</h3>
                            <p>Pembuatan resi operasional otomatis.</p>
                        </div>
                        <div class="card" onclick="openTool('https://script.google.com/macros/s/AKfycbxXPnIlhhYONrAUYcjk67IkKDZz4WaQBJ5XTm1S40NKJG6pNHDnbw1AY3eIXKE2hq1K/exec', null)">
                            <h3>PENDATAAN PAKET</h3>
                            <p>Sistem pencatatan paket masuk/keluar.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="frame-container">
            <iframe id="main-frame" src=""></iframe>
        </div>
    </main>

    <script>
        const ui = {
            db: document.getElementById('dashboard'),
            cont: document.getElementById('frame-container'),
            frame: document.getElementById('main-frame'),
            items: document.querySelectorAll('.nav-item'),
            secProd: document.getElementById('section-prod'),
            secUtil: document.getElementById('section-util')
        };

        // Fungsi Filter Group
        function filterGroup(type, el) {
            goHome(); // Pastikan kembali ke dashboard dulu
            ui.items.forEach(i => i.classList.remove('active'));
            el.classList.add('active');

            if(type === 'all') {
                ui.secProd.style.display = 'block';
                ui.secUtil.style.display = 'block';
            } else if(type === 'prod') {
                ui.secProd.style.display = 'block';
                ui.secUtil.style.display = 'none';
            } else if(type === 'util') {
                ui.secProd.style.display = 'none';
                ui.secUtil.style.display = 'block';
            }
        }

        function openTool(url, el) {
            ui.db.style.display = 'none';
            ui.cont.style.display = 'block';
            ui.frame.src = url;
            if(el) {
                ui.items.forEach(i => i.classList.remove('active'));
                el.classList.add('active');
            }
        }

        function goHome() {
            ui.db.style.display = 'block';
            ui.cont.style.display = 'none';
            ui.frame.src = '';
            // Reset scroll ke atas
            ui.db.scrollTop = 0;
        }
    </script>
</body>
</html>
