<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REYNAHUB | SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --side: #000000; --red: #ff0000; --border: #eeeeee; --nav-h: 65px; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Inter', sans-serif; display: flex; overflow: hidden; background: var(--bg); }

        /* SIDEBAR (Desktop) */
        aside {
            width: 70px; min-width: 70px; background: var(--side); 
            display: flex; flex-direction: column; align-items: center; padding: 25px 0; z-index: 100;
        }
        .logo-box { color: var(--red); font-weight: 900; font-size: 1.4rem; cursor: pointer; margin-bottom: 30px; }
        .nav-wrapper { flex: 1; display: flex; flex-direction: column; gap: 20px; align-items: center; width: 100%; }
        .nav-item {
            width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; cursor: pointer; transition: 0.2s; color: #555; background: none; border: none;
        }
        .nav-item svg { width: 22px; height: 22px; fill: currentColor; }
        .nav-item:hover, .nav-item.active { color: #fff; background: #1a1a1a; }
        .nav-item.active { color: var(--red); }

        /* MAIN CONTENT */
        main { flex: 1; height: 100vh; position: relative; display: flex; flex-direction: column; overflow-y: auto; background: #fff; }

        /* DASHBOARD - MOBILE OPTIMIZED */
        #dashboard { display: block; width: 100%; }
        .banner {
            width: 100%; height: clamp(160px, 25vh, 220px); background: var(--side); color: white;
            display: flex; flex-direction: column; justify-content: center; padding: 0 40px; position: relative;
        }
        .banner h1 { font-size: clamp(1.8rem, 8vw, 2.5rem); font-weight: 900; margin: 0; letter-spacing: -1px; line-height: 1; }
        .banner p { font-size: 0.65rem; color: #555; margin-top: 8px; letter-spacing: 2px; text-transform: uppercase; }

        .content-padding { padding: 40px; }
        .group-header { display: flex; align-items: center; gap: 15px; margin: 30px 0 15px; font-size: 0.65rem; font-weight: 700; color: #bbb; letter-spacing: 1.5px; }
        .group-header .line { flex: 1; height: 1px; background: #eee; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .card { border: 1px solid var(--border); padding: 25px; cursor: pointer; transition: 0.2s; background: #fff; position: relative; }
        .card:hover { border-color: #000; transform: translateY(-3px); box-shadow: 10px 10px 0 rgba(0,0,0,0.02); }
        .card h3 { margin: 0; font-size: 0.9rem; font-weight: 900; text-transform: uppercase; }
        .card p { margin: 5px 0 0; font-size: 0.75rem; color: #888; line-height: 1.4; }

        /* IFRAME FULLSCREEN */
        #frame-container { display: none; width: 100%; height: 100%; }
        iframe { width: 100%; height: 100%; border: none; background: #fff; }

        /* MOBILE FIX */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            aside {
                width: 100%; height: var(--nav-h); min-width: auto; flex-direction: row;
                padding: 0 15px; position: fixed; bottom: 0; left: 0; gap: 0; border-top: 1px solid #1a1a1a;
            }
            .logo-box { display: none; }
            .nav-wrapper { flex-direction: row; justify-content: space-around; }
            
            main { height: calc(100vh - var(--nav-h)); }
            .banner { padding: 0 25px; height: 180px; }
            .content-padding { padding: 25px; padding-bottom: 40px; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <aside>
        <div class="logo-box" onclick="goHome()">R.</div>
        <div class="nav-wrapper">
            <div class="nav-item active" id="btn-home" onclick="goHome()" title="Home">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            </div>
            <div class="nav-item" onclick="openTool('https://script.google.com/macros/s/AKfycbwe-6KNZWNPUtamF6UGwidijBKo2s2wRZNFLjDBXgkjClMsrIfTKqX-UvJyvYllj7X3/exec', this)" title="Team Planner">
                <svg viewBox="0 0 24 24"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1s-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
            </div>
            <div class="nav-item" onclick="openTool('https://script.google.com/macros/s/AKfycbwuQq-fW0SgJUuRwrKUZRPurcZ3oAvd7ZEgv-R3_hcyMoPubFjVueh1sVpOVvfiTrDMQw/exec', this)" title="Resi Generator">
                <svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.5 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>
            </div>
            <div class="nav-item" onclick="openTool('about/', this)" title="About">
                <svg viewBox="0 0 24 24"><path d="M11 18h2v-2h-2v2zm1-16C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm0-14c-2.21 0-4 1.79-4 4h2c0-1.1.9-2 2-2s2 .9 2 2c0 2-3 1.75-3 5h2c0-2.25 3-2.5 3-5 0-2.21-1.79-4-4-4z"/></svg>
            </div>
        </div>
    </aside>

    <main>
        <div id="dashboard">
            <section class="banner">
                <p>System Operating Hub</p>
                <h1>REYNAHUB<br>_SYSTEM</h1>
            </section>
            <div class="content-padding">
                <div class="group-header"><span>01 / PRODUCTION</span><div class="line"></div></div>
                <div class="grid">
                    <div class="card" onclick="openTool('https://script.google.com/macros/s/AKfycbwe-6KNZWNPUtamF6UGwidijBKo2s2wRZNFLjDBXgkjClMsrIfTKqX-UvJyvYllj7X3/exec', null)">
                        <h3>TEAM PLANNER</h3>
                        <p>Task management system.</p>
                    </div>
                </div>
                <div class="group-header"><span>02 / UTILITY</span><div class="line"></div></div>
                <div class="grid">
                    <div class="card" onclick="openTool('https://script.google.com/macros/s/AKfycbwuQq-fW0SgJUuRwrKUZRPurcZ3oAvd7ZEgv-R3_hcyMoPubFjVueh1sVpOVvfiTrDMQw/exec', null)">
                        <h3>RESI GENERATOR</h3>
                        <p>Automated operational receipts.</p>
                    </div>
                </div>
            </div>
        </div>
        <div id="frame-container">
            <iframe id="main-frame" src=""></iframe>
        </div>
    </main>

    <script>
        const ui = {
            db: document.getElementById('dashboard'),
            cont: document.getElementById('frame-container'),
            frame: document.getElementById('main-frame'),
            items: document.querySelectorAll('.nav-item'),
            home: document.getElementById('btn-home')
        };

        function openTool(url, el) {
            ui.db.style.display = 'none';
            ui.cont.style.display = 'block';
            ui.frame.src = url;
            ui.items.forEach(i => i.classList.remove('active'));
            if(el) el.classList.add('active');
        }

        function goHome() {
            ui.db.style.display = 'block';
            ui.cont.style.display = 'none';
            ui.frame.src = '';
            ui.items.forEach(i => i.classList.remove('active'));
            ui.home.classList.add('active');
        }
    </script>
</body>
</html>
