<!DOCTYPE html>
<html>
<head>
    <title>Team Planner - ReynaHub</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #f4f7f6; font-family: sans-serif; }
        .loader { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
        iframe { width: 100%; height: 100%; border: none; opacity: 0; transition: opacity 0.5s; }
    </style>
</head>
<body>
    <div id="loading" class="loader">
        <p>Memuat Tasklist...</p> </div>

    <iframe id="myIframe" src="https://script.google.com/macros/s/AKfycbzWrhOEWww78mDrg-eLEO2MTbv-7w0kUHc8kTUWJCVon0SGCPWHjgIJ7OcLaXemNfYt/exec" onload="showIframe()"></iframe>

    <script>
        function showIframe() {
            document.getElementById('myIframe').style.opacity = "1";
            document.getElementById('loading').style.display = "none";
        }
    </script>
</body>
</html>
