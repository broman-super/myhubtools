<!DOCTYPE html>
<html>
<head>
    <title>Sales v2.1 - Stable</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans'; background: #f8fafc; padding: 20px; }
        .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .card { background: #fff; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .label { font-size: 10px; color: #64748b; font-weight: 800; text-transform: uppercase; }
        .val { font-size: 20px; font-weight: 800; margin: 10px 0; }
        .bar-bg { width: 100%; height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; }
        .bar-fill { height: 100%; background: #2563eb; width: 0%; transition: 0.5s; }
        .btn-update { background: #2563eb; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="color:#2563eb;">SUPERSUB DASHBOARD</h2>
        <button class="btn-update" onclick="loadData()">REFRESH DATABASE</button>
    </div>

    <div class="kpi-row">
        <div class="card">
            <div class="label">Real Sales vs Target</div>
            <div id="kpiSales" class="val">Rp 0</div>
            <div class="bar-bg"><div id="kpiBar" class="bar-fill"></div></div>
            <div id="kpiPct" style="font-size:11px; margin-top:8px; font-weight:800;">0% dari 820JT</div>
        </div>
        <div class="card">
            <div class="label">Total Retur</div>
            <div id="kpiRetur" class="val" style="color:#ef4444;">Rp 0</div>
        </div>
        <div class="card">
            <div class="label">Laba Bersih (Estimasi)</div>
            <div id="kpiNet" class="val" style="color:#10b981;">Rp 0</div>
        </div>
        <div class="card">
            <div class="label">Total Biaya</div>
            <div id="kpiOpex" class="val">Rp 0</div>
        </div>
    </div>

    <div class="card">
        <div class="label">Diagnosa AI</div>
        <div id="aiRes" style="font-size:13px; margin:15px 0; line-height:1.6;">Klik tombol untuk analisis...</div>
        <button onclick="tanyaAI()" style="width:100%; padding:10px; border-radius:6px; cursor:pointer; font-weight:800;">TANYA GEMINI</button>
    </div>

    <script>
        // PASTIIN URL INI ADALAH URL /exec YANG BARU DARI LANGKAH 1
        const API = 'https://script.google.com/macros/s/AKfycbxdVYtSmi7atvB-UMyl7bm-VW8kAjDjw6FxTOevSEjX2phfG2fAmk-XZ3z8BEsLQTDJIg/exec';
        let db = { transaksi: [], biaya: [], produk: [] };
        const fmt = (n) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(n);

        async function loadData() {
            document.body.style.opacity = '0.5';
            try {
                const res = await fetch(API + "?action=getSalesData");
                db = await res.json();
                render();
            } catch (e) { alert("Gagal narik data!"); }
            document.body.style.opacity = '1';
        }

        function render() {
            let sales = 0, retur = 0, opex = 0, hpp = 0;
            const TARGET = 820000000;

            // Buat kamus modal
            let modal = {};
            db.produk.forEach(p => modal[(p['Nama Barang']||'').toUpperCase().trim()] = parseFloat(p['HPP']||0));

            db.transaksi.forEach(t => {
                let n = parseFloat(t['Total Harga'] || 0);
                let q = parseInt(t['Kuantitas'] || 0);
                let item = (t['Nama Barang']||'').toUpperCase().trim();
                let tipe = (t['Tipe Transaksi']||'').toLowerCase();

                if (tipe.includes('retur')) {
                    retur += Math.abs(n);
                    hpp -= (modal[item] || 0) * q;
                } else {
                    sales += n;
                    hpp += (modal[item] || 0) * q;
                }
            });

            db.biaya.forEach(b => opex += parseFloat(b['Nominal'] || 0));

            let net = (sales - retur) - hpp - opex;
            let pct = (sales / TARGET) * 100;

            document.getElementById('kpiSales').innerText = fmt(sales);
            document.getElementById('kpiPct').innerText = pct.toFixed(1) + "% dari 820JT";
            document.getElementById('kpiBar').style.width = Math.min(pct, 100) + "%";
            document.getElementById('kpiRetur').innerText = fmt(retur);
            document.getElementById('kpiOpex').innerText = fmt(opex);
            document.getElementById('kpiNet').innerText = fmt(net);
        }

        async function tanyaAI() {
            const resBox = document.getElementById('aiRes');
            resBox.innerText = "Berpikir...";
            const ctx = `Data: Sales ${fmt(sales)}, Profit ${fmt(net)}. Berikan 2 saran singkat.`;
            try {
                const r = await fetch(API + "?action=getAnalysis&context=" + encodeURIComponent(ctx));
                const j = await r.json();
                resBox.innerText = j.analysis;
            } catch (e) { resBox.innerText = "Gagal panggil AI."; }
        }

        loadData();
    </script>
</body>
</html>
