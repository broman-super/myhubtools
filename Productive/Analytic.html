<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Intel Pro v7.9 - Rollback Stable</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --primary: #2563eb; --success: #10b981; --danger: #ef4444; --border: #e2e8f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .nav-bar { background: #fff; padding: 15px; border-radius: 12px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .btn-refresh { background: var(--primary); color: #fff; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 800; cursor: pointer; }
        .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .kpi-card { background: #fff; padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
        .kpi-label { font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; }
        .kpi-val { font-size: 18px; font-weight: 800; margin: 5px 0; }
        .progress-bg { width: 100%; height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.5s; }
        .main-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 15px; }
        .card { background: #fff; border-radius: 12px; border: 1px solid var(--border); padding: 15px; }
        .item-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f1f5f9; font-size: 12px; }
        #loadingScreen { position:fixed; inset:0; background:#fff; z-index:999; display:flex; flex-direction:column; justify-content:center; align-items:center; }
    </style>
</head>
<body>

<div id="loadingScreen">
    <p style="font-weight:800;">CONNECTING TO DATABASE...</p>
</div>

<div class="nav-bar">
    <h1 style="font-size:18px; color:var(--primary);">SUPERSUB ANALYTICS</h1>
    <button class="btn-refresh" onclick="initDashboard()">REFRESH DATA</button>
</div>

<div class="kpi-row">
    <div class="kpi-card">
        <div class="kpi-label">Real Sales vs Target</div>
        <div id="kpiSales" class="kpi-val">Rp 0</div>
        <div class="progress-bg"><div id="kpiSalesProgress" class="progress-fill"></div></div>
        <p id="kpiSalesPct" style="font-size:10px; font-weight:800; margin-top:5px;">0% dari 820JT</p>
    </div>
    <div class="kpi-card">
        <div class="kpi-label">Total Retur</div>
        <div id="kpiRetur" class="kpi-val" style="color:var(--danger);">Rp 0</div>
    </div>
    <div class="kpi-card">
        <div class="kpi-label">Laba Bersih (Estimasi)</div>
        <div id="kpiNet" class="kpi-val" style="color:var(--success);">Rp 0</div>
    </div>
    <div class="kpi-card">
        <div class="kpi-label">Total Pengeluaran</div>
        <div id="kpiOpex" class="kpi-val">Rp 0</div>
    </div>
</div>

<div class="main-grid">
    <div class="card">
        <h3 style="font-size:12px; margin-bottom:10px;">TOP 10 PARTNER</h3>
        <div id="partnerList"></div>
    </div>
    <div class="card">
        <h3 style="font-size:12px; margin-bottom:10px;">RINGKASAN BIAYA</h3>
        <div id="opexList"></div>
    </div>
</div>

<script>
    // URL API LU YANG TERBARU
    const API_URL = 'https://script.google.com/macros/s/AKfycbzKIYkTje5zb41JZ3H_PowtxrVRkbNDNmro4kEnMg-E9FY-fhDKDlrEvir14zvPRzigEw/exec';
    
    let rawDataTransaksi = [], rawDataBiaya = [], katalogProduk = {};
    const formatRp = (n) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(n);

    async function initDashboard() {
        document.getElementById('loadingScreen').style.display = 'flex';
        try {
            const res = await fetch(API_URL + "?action=getSalesData");
            const data = await res.json();
            
            // Simpan data ke variabel global
            rawDataTransaksi = data.transaksi || [];
            rawDataBiaya = data.biaya || [];
            
            // Bangun Kamus Produk (HPP)
            if (data.produk) {
                data.produk.forEach(p => {
                    katalogProduk[(p['Nama Barang'] || '').toUpperCase().trim()] = { hpp: parseFloat(p['HPP'] || 0) };
                });
            }

            document.getElementById('loadingScreen').style.display = 'none';
            prosesData();
        } catch (e) {
            alert("Error: Gagal narik data. Pastikan API URL benar.");
            console.error(e);
        }
    }

    function prosesData() {
        let totalSales = 0, totalRetur = 0, totalHpp = 0, totalOpex = 0;
        let partnerMap = {}, opexMap = {};
        const TARGET = 820000000;

        // 1. Olah Transaksi
        rawDataTransaksi.forEach(trx => {
            let nilai = parseFloat(trx['Total Harga'] || 0);
            let qty = parseInt(trx['Kuantitas'] || 0);
            let item = (trx['Nama Barang'] || '').toUpperCase().trim();
            let isRetur = (trx['Tipe Transaksi'] || '').toLowerCase().includes('retur');
            let hppSatuan = katalogProduk[item]?.hpp || 0;

            if (isRetur) {
                totalRetur += Math.abs(nilai);
                totalHpp -= (hppSatuan * qty);
            } else {
                totalSales += nilai;
                totalHpp += (hppSatuan * qty);
                let pName = trx['Nama Pelanggan'] || 'Umum';
                partnerMap[pName] = (partnerMap[pName] || 0) + nilai;
            }
        });

        // 2. Olah Biaya
        rawDataBiaya.forEach(b => {
            let nom = parseFloat(b['Nominal'] || 0);
            totalOpex += nom;
            let kat = b['Kategori Biaya'] || 'Lainnya';
            opexMap[kat] = (opexMap[kat] || 0) + nom;
        });

        // 3. Hitung Akhir
        let netProfit = (totalSales - totalRetur) - totalHpp - totalOpex;
        let achPct = (totalSales / TARGET) * 100;

        // 4. Update Tampilan
        document.getElementById('kpiSales').innerText = formatRp(totalSales);
        document.getElementById('kpiSalesPct').innerText = achPct.toFixed(1) + "% dari 820JT";
        document.getElementById('kpiSalesProgress').style.width = Math.min(achPct, 100) + "%";
        document.getElementById('kpiRetur').innerText = formatRp(totalRetur);
        document.getElementById('kpiOpex').innerText = formatRp(totalOpex);
        document.getElementById('kpiNet').innerText = formatRp(netProfit);

        // Render List Partner
        const topP = Object.entries(partnerMap).sort((a,b) => b[1]-a[1]).slice(0, 10);
        document.getElementById('partnerList').innerHTML = topP.map(p => `
            <div class="item-row"><span>${p[0]}</span><b>${formatRp(p[1])}</b></div>
        `).join('');

        // Render List Opex
        document.getElementById('opexList').innerHTML = Object.entries(opexMap).map(o => `
            <div class="item-row"><span>${o[0]}</span><b style="color:var(--danger)">${formatRp(o[1])}</b></div>
        `).join('');
    }

    initDashboard();
</script>
</body>
</html>
