<div id="loginModal" class="modal-overlay" style="display:none;">
  <div class="modal">
    <h3 class="modal-title">Login Admin</h3>
    <input type="password" id="loginPin" class="modal-input" placeholder="Masukkan PIN" autocomplete="off">
    <p id="loginError" class="modal-error" style="display:none;"></p>
    <div class="modal-actions">
      <button id="loginCancel" class="dash-btn">Batal</button>
      <button id="loginSubmit" class="dash-btn dash-btn-primary">Masuk</button>
    </div>
  </div>
</div>

<div id="deleteModal" class="modal-overlay" style="display:none;">
  <div class="modal">
    <h3 class="modal-title">Konfirmasi Hapus</h3>
    <p id="deleteMessage" class="modal-body"></p>
    <div class="modal-actions">
      <button id="deleteCancel" class="dash-btn">Batal</button>
      <button id="deleteConfirm" class="dash-btn dash-btn-danger">Ya, Hapus</button>
    </div>
  </div>
</div>

<div id="loadingOverlay" class="modal-overlay" style="display:none;"></div>

<datalist id="dashCatList"></datalist>
