<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LATCH — Link Hub</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%231a1a1e'/%3E%3Ctext x='16' y='22' font-size='16' font-weight='700' text-anchor='middle' fill='white' font-family='system-ui'%3EL%3C/text%3E%3C/svg%3E">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1a1e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
  <div class="container" id="app"></div>

  <script type="text/html" id="fragment-public">
<div id="viewContent">
  <div class="card card-atm">
    <div class="atm-brand">
      <h1 class="atm-title">LATCH</h1>
      <p class="atm-tagline">LINK ATTACH <span class="brand-by">by</span> <strong>Supersub</strong> Teamwork</p>
    </div>
    <div class="atm-divider"></div>
    <div class="atm-announce">
      <span class="atm-announce-icon">📢</span>
      <span>Maintenance server scheduled Sabtu, 12 Juli 2026 pukul 02:00 - 04:00 WIB.</span>
    </div>
    <div class="atm-clock" id="atmClock"></div>
  </div>

  <div class="search-wrapper">
    <div class="search-bar search-bar-primary">
      <i data-feather="search" class="search-icon"></i>
      <input type="text" id="searchInput" placeholder="Cari link..." autocomplete="off">
      <span class="search-hint">Ctrl+K</span>
    </div>
  </div>

  <div class="tabs-wrapper" id="tabsWrapper">
    <div class="tabs-container" id="tabsContainer"></div>
  </div>

  <div class="grid-container" id="linksGrid"></div>
  <div class="grid-counter" id="gridCounter"></div>

  <div id="noResults" class="no-results" style="display:none;">
    <div class="no-results-icon">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
    </div>
    <p class="no-results-title">Tidak ada link ditemukan</p>
    <p class="no-results-hint">Coba ubah kata kunci pencarian atau pilih kategori lain</p>
  </div>
</div>
  </script>

  <script type="text/html" id="fragment-admin">
<div id="dashboardContent" style="display:none;">
  <div class="card card-atm card-atm-admin">
    <div class="atm-brand">
      <h1 class="atm-title">LATCH</h1>
      <p class="atm-tagline">DASHBOARD <span class="brand-by">|</span> <strong>Admin Panel</strong></p>
    </div>
    <div class="atm-divider"></div>
    <div class="admin-header-row">
      <button id="bulkDeleteBtn" class="dash-btn dash-btn-danger" style="display:none" title="Hapus terpilih">🗑</button>
      <span class="dashboard-count" id="dashCount">0 link</span>
    </div>
    <button id="logoutBtn" class="dash-btn dash-btn-logout">Keluar</button>
    <div class="atm-clock dash-clock" id="dashClock"></div>
  </div>

  <div class="dashboard-toolbar">
    <button id="addRowBtn" class="dash-btn dash-btn-primary">+ Tambah Baris</button>
    <button id="catManageBtn" class="dash-btn dash-btn-secondary">📂 Kategori</button>
    <div class="toolbar-right">
      <button id="exportCsvBtn" class="dash-btn" title="Export CSV">📤 Export</button>
      <button id="importCsvBtn" class="dash-btn" title="Import CSV">📥 Import</button>
    </div>
  </div>

  <div class="dashboard-search">
    <div class="search-bar">
      <i data-feather="search" class="search-icon"></i>
      <input type="text" id="dashSearchInput" placeholder="Cari di dashboard..." autocomplete="off">
    </div>
  </div>

  <div class="dashboard-layout">
    <div class="dashboard-table" id="dashboardTable"></div>
    <nav class="dash-nav" id="dashNav"></nav>
    <button class="dash-nav-toggle" id="dashNavToggle" title="Kategori">📂</button>
  </div>

  <div id="catSheet" class="sheet-overlay" style="display:none;">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <h3 class="sheet-title">Kategori</h3>
      <div class="sheet-body" id="catSheetBody"></div>
    </div>
  </div>

  <div id="slideDrawer" class="drawer-overlay" style="display:none;">
    <div class="drawer">
      <div class="drawer-header">
        <h3 class="drawer-title" id="drawerTitle">Tambah/Edit Link</h3>
        <button class="drawer-close" id="drawerClose">&times;</button>
      </div>
      <div class="drawer-body">
        <label class="drawer-label">Judul</label>
        <input type="text" id="drawerTitleInput" class="drawer-input" placeholder="Judul link">
        <label class="drawer-label">URL</label>
        <input type="url" id="drawerUrlInput" class="drawer-input" placeholder="https://">
        <label class="drawer-label">Kategori</label>
        <div class="dash-select-wrap">
          <select id="drawerCatInput" class="drawer-input"></select>
          <svg class="dash-select-arrow" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>
      </div>
      <div class="drawer-footer">
        <button id="drawerSave" class="dash-btn dash-btn-primary">Simpan</button>
        <button id="drawerCancel" class="dash-btn">Batal</button>
      </div>
    </div>
  </div>

  <div id="catModal" class="modal-overlay" style="display:none;">
    <div class="modal modal-wide">
      <h3 class="modal-title">Kelola Kategori</h3>
      <div class="cat-list" id="catList"></div>
      <div class="cat-add-row">
        <input type="text" id="catNameInput" class="modal-input" placeholder="Nama kategori baru">
        <button id="catAddBtn" class="dash-btn dash-btn-primary">Tambah</button>
      </div>
      <div class="modal-actions">
        <button id="catClose" class="dash-btn">Selesai</button>
      </div>
    </div>
  </div>
</div>

<div id="shortcutModal" class="modal-overlay" style="display:none;">
  <div class="modal">
    <h3 class="modal-title">Pintasan Keyboard</h3>
    <div class="shortcut-list">
      <div class="shortcut-row"><kbd>Ctrl+K</kbd><span>Fokus pencarian</span></div>
      <div class="shortcut-row"><kbd>Ctrl+L</kbd><span>Buka link terpilih</span></div>
      <div class="shortcut-row"><kbd>Esc</kbd><span>Tutup modal / Hapus pencarian</span></div>
      <div class="shortcut-row"><kbd>?</kbd><span>Tampilkan bantuan ini</span></div>
    </div>
    <div class="modal-actions">
      <button id="shortcutClose" class="dash-btn">Tutup</button>
    </div>
  </div>
</div>
  </script>

  <script type="text/html" id="fragment-modals">
<div id="loginModal" class="modal-overlay" style="display:none;">
  <div class="modal">
    <h3 class="modal-title">Login Admin</h3>
    <input type="password" id="loginPin" class="modal-input" placeholder="Masukkan PIN" autocomplete="off">
    <p id="loginError" class="modal-error" style="display:none;"></p>
    <div class="modal-actions">
      <button id="loginCancel" class="dash-btn">Batal</button>
      <button id="loginSubmit" class="dash-btn dash-btn-primary">Masuk</button>
    </div>
  </div>
</div>

<div id="deleteModal" class="modal-overlay" style="display:none;">
  <div class="modal">
    <h3 class="modal-title">Konfirmasi Hapus</h3>
    <p id="deleteMessage" class="modal-body"></p>
    <div class="modal-actions">
      <button id="deleteCancel" class="dash-btn">Batal</button>
      <button id="deleteConfirm" class="dash-btn dash-btn-danger">Ya, Hapus</button>
    </div>
  </div>
</div>

<div id="loadingOverlay" class="modal-overlay" style="display:none;"></div>

<datalist id="dashCatList"></datalist>
  </script>

  <script type="text/html" id="fragment-footer">
<div class="footer" id="footerArea">
  &copy; 2026 LATCH Link Hub &mdash; Internal Tools
  <button id="loginBtn" class="login-btn" title="Admin Login">🔑</button>
</div>

<button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
  <i data-feather="sun" class="sun-icon"></i>
  <i data-feather="moon" class="moon-icon" style="display:none;"></i>
</button>

<button id="backToTop" class="back-to-top" title="Ke atas">↑</button>
  </script>

  <script src="https://unpkg.com/feather-icons@4.29.2/dist/feather.min.js"></script>
  <script src="js/db-offline.js"></script>
  <script src="js/core/utils.js"></script>
  <script src="js/core/state.js"></script>
  <script src="js/core/storage.js"></script>
  <script src="js/core/db.js"></script>
  <script src="js/core/layout.js"></script>
  <script src="js/ui/components.js"></script>
  <script src="js/ui/view.js"></script>
  <script src="js/ui/dashboard.js"></script>
  <script src="js/ui/theme.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
