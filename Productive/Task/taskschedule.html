  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbx8On9-9HY1k5VYp9AUy5Okq-1k1tDJf6ZaPuEpidRq7CPae7w43Al_YVPOyiEMs4Iz/exec";

    var S = {
      tasks: [], events: [], reminders: [], view: 'list', filter: 'pending', q: '',
      weekOffset: 0, showMonthTasks: false, showMonthEvents: false, showMonthReminders: false,
      calYear: new Date().getFullYear(), calMonth: new Date().getMonth(),
      selectedId: null, dpTarget: null,
      dpYear: new Date().getFullYear(), dpMonth: new Date().getMonth(),
      timelineYear: new Date().getFullYear(), timelineMonth: new Date().getMonth(),
      timelineSelectedDate: null, timelineZoom: 0, timelineLabelWidth: 180,
      activeTags: [], activePriorities: [],
      listPage: 0, undoStack: [], redoStack: [], saving: false
    };

    const MONTHS_ID = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
    const DAYS_ID = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
    const DAYS_SHORT = ['Min', 'Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab'];
    const COLORS = ['#212121', '#ffffff', '#f97316', '#06b6d4', '#10b981', '#ef4444', '#6366f1'];
    const CHANNELS = {
      'Instagram': { color: '#a855f7', prefix: 'IG |' },
      'Whatsapp':  { color: '#22c55e', prefix: 'WA |' },
      'Tiktok':    { color: '#9ca3af', prefix: 'TT |' },
      'Shopee':    { color: '#f97316', prefix: 'SP |' },
      'Web':       { color: '#3b82f6', prefix: 'WB |' },
      'Event':     { color: '#14b8a6', prefix: 'EV |' }
    };

    // Normalize ISO date strings to YYYY-MM-DD
    function normDate(v) {
      if (!v) return '';
      const s = String(v);
      // Parse ISO string to local Date to prevent timezone offset (-1 day) issues
      if (s.includes('T')) {
        const d = new Date(s);
        if (!isNaN(d.getTime())) {
          return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
        }
      }
      if (s.length > 10 && s[10] === 'T') return s.slice(0, 10);
      return s;
    }

    // Utils
    function esc(t) { return (t || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
    function pad(n) { return n < 10 ? '0' + n : n; }
    function dateStr(d) { return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()); }
    function formatShortDate(d) {
      const p = d.split('-');
      return parseInt(p[2], 10) + ' ' + MONTHS_ID[parseInt(p[1], 10) - 1].slice(0, 3);
    }
    function hexAlpha(hex, a) {
      let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r},${g},${b},${a})`;
    }

    async function api(action, data = null) {
      const loader = document.getElementById('top-loader');
      if (loader) loader.style.display = 'block';
      try {
        if (action === 'getTasks') {
          const r = await fetch(`${GAS_URL}?action=getTasks`, { mode: 'cors', redirect: 'follow' });
          if (!r.ok) throw new Error("HTTP " + r.status);
          const raw = await r.json();
          S.tasks = (Array.isArray(raw) ? raw : []).map(t => ({
            ...t,
            enddate: normDate(t.enddate || t.endDate || ''),
            date: normDate(t.date),
            type: String(t.type || 'task').toLowerCase().trim() === 'campaign' ? 'campaign' : 'task',
            color: t.color || '#6366f1'
          }));
          try { localStorage.setItem('ts_cache_data', JSON.stringify({ timestamp: Date.now(), data: S.tasks })); } catch(e){}
          return S.tasks;
        }
        if (action === 'getCalendarData') {
          const r = await fetch(GAS_URL, {
            method: 'POST', mode: 'cors', redirect: 'follow',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action, data })
          });
          const json = await r.json();
          if (!json.success) throw new Error(json.message || 'Gagal load calendar');
          S.tasks = [].concat(
            (json.result.tasks || []).map(function(t) { return {
              ...t, title: t.title || t.nama || '', enddate: normDate(t.enddate || t.endDate || t.selesai || ''),
              date: normDate(t.date || t.mulai || ''),
              type: 'task',
              color: t.color || t.warna || '#6366f1'
            }; }),
            (json.result.campaigns || []).map(function(c) { return {
              ...c, title: c.title || c.nama || '', enddate: normDate(c.enddate || c.endDate || c.selesai || ''),
              date: normDate(c.date || c.mulai || ''),
              type: 'campaign',
              color: c.color || c.warna || '#6366f1'
            }; })
          );
          S.events = (json.result.events || []).map(function(e) { return {
            id: e.id, title: e.nama || '', date: normDate(e.mulai || ''),
            enddate: normDate(e.selesai || ''), description: e.deskripsi || '',
            penyelenggara: e.penyelenggara || '', color: e.warna || '#14b8a6',
            status: e.status || '', done: e.status === 'Selesai', type: 'event'
          }; });
          S.reminders = (json.result.reminders || []).map(function(r) { return {
            id: r.id, title: r.nama || '', date: normDate(r.mulai || ''),
            enddate: normDate(r.selesai || ''), description: r.deskripsi || '',
            color: r.warna || '#f59e0b', status: r.status || '',
            done: r.status === 'Selesai', type: 'reminder'
          }; });
          return json.result;
        }
        const resp = await fetch(GAS_URL, {
          method: 'POST',
          mode: 'cors',
          redirect: 'follow',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action, data })
        });
        if (!resp.ok) throw new Error("HTTP " + resp.status);
        return await resp.json();
      } catch (e) {
        console.error("[GAS] fetch gagal:", e);
        throw e;
      } finally {
        if (loader) loader.style.display = 'none';
      }
    }

    // Core Controls
    async function refreshData(silent = false) {
      const btn = document.getElementById('refresh-btn');
      const btn2 = document.getElementById('refresh-btn-top');
      if (btn) btn.classList.add('spinning');
      if (btn2) btn2.disabled = true;
      try {
        await api('getCalendarData');
        renderAll();
        if (!silent) toast('✓ Data diperbarui');
      } catch (e) {
        if (!silent) toast('Gagal refresh!', true);
      } finally {
        if (btn) btn.classList.remove('spinning');
        if (btn2) btn2.disabled = false;
      }
    }

    function hideLoading() {
      const ov = document.getElementById('loading-overlay');
      if (!ov) return;
      ov.style.opacity = '0';
      setTimeout(() => { ov.style.display = 'none'; }, 400);
    }

    const holidaysCache = {};
    const fetchedYears = new Set();
    async function fetchHolidays(year) {
      if (fetchedYears.has(year)) return;
      fetchedYears.add(year);
      try {
        const cached = localStorage.getItem(`ts_holidays_${year}`);
        if (cached) {
          const data = JSON.parse(cached);
          data.forEach(h => { holidaysCache[h.date] = h; });
          renderAll();
        }
        
        fetch(`https://tanggalmerah.upset.dev/api/holidays?year=${year}`)
          .then(res => res.json())
          .then(json => {
            if (json.success) {
              json.data.forEach(h => { holidaysCache[h.date] = h; });
              try { localStorage.setItem(`ts_holidays_${year}`, JSON.stringify(json.data)); } catch(e){}
              renderAll(); // Re-render to show red highlight
            }
          })
          .catch(e => {
            console.warn('Failed to load holidays', e);
            // Fallback static holiday jika cache pun gak ada
            if (Object.keys(holidaysCache).length === 0) {
              var staticHolidays = [
                "2026-01-01", "2026-01-27", "2026-03-29", "2026-03-30",
                "2026-03-31", "2026-04-01", "2026-04-02", "2026-04-03",
                "2026-04-04", "2026-04-10", "2026-05-01", "2026-05-13",
                "2026-05-14", "2026-06-01", "2026-07-17", "2026-08-17",
                "2026-09-04", "2026-11-15", "2026-12-24", "2026-12-25"
              ];
              staticHolidays.forEach(function(d) {
                holidaysCache[d] = { date: d, name: "Hari Libur" };
              });
              renderAll();
            }
          });
      } catch (e) { console.warn('Failed to load holidays cache', e); }
    }

    window.onload = () => {
      // Safety net: always hide loading after 12s no matter what
      const safetyTimer = setTimeout(hideLoading, 12000);

      try { buildSwatches(); } catch (e) { console.warn('buildSwatches error', e); }
      try { setMeta(); } catch (e) { console.warn('setMeta error', e); }
      fetchHolidays(new Date().getFullYear());

      // Optimistic Offline Cache Load
      try {
        const cachedTasks = localStorage.getItem('ts_cache_data');
        if (cachedTasks) {
          var parsed = JSON.parse(cachedTasks);
          // TTL 5 menit
          if (parsed && parsed.timestamp && Date.now() - parsed.timestamp < 5 * 60 * 1000) {
            S.tasks = parsed.data || [];
            renderAll();
            hideLoading();
          }
        }
      } catch(e){}

      api('getCalendarData')
        .then(function() {
          try { renderAll(); } catch (e) { console.warn('renderAll error', e); }
        })
        .catch(function(err) {
          console.warn('getCalendarData failed, fallback getTasks', err);
          return api('getTasks').then(function() {
            try { renderAll(); } catch (e) { }
          }).catch(function() { });
        })
        .finally(function() {
          clearTimeout(safetyTimer);
          hideLoading();
        });

      // Label column drag resize
      const dragHandle = document.getElementById('tl-label-drag');
      if (dragHandle) {
        let dragging = false;
        dragHandle.addEventListener('mousedown', function(e) {
          dragging = true;
          e.preventDefault();
          document.body.style.cursor = 'col-resize';
          document.body.style.userSelect = 'none';
        });
        // Double-click to auto-fit to longest title
        dragHandle.addEventListener('dblclick', function() {
          let maxW = 120;
          const items = S.view === 'timeline' ? getTimelineItems() : [];
          items.forEach(item => {
            const title = item.title || '';
            // Approximate: ~7px per char for 12px font
            const est = title.length * 7 + 40;
            if (est > maxW) maxW = est;
          });
          S.timelineLabelWidth = Math.min(250, Math.max(120, maxW));
          renderTimeline();
        });
        document.addEventListener('mousemove', function(e) {
          if (!dragging) return;
          const scrollEl = document.getElementById('timeline-scroll');
          if (!scrollEl) return;
          const rect = scrollEl.getBoundingClientRect();
          let w = e.clientX - rect.left;
          w = Math.max(120, Math.min(250, w));
          S.timelineLabelWidth = w;
          renderTimeline();
        });
        document.addEventListener('mouseup', function() {
          if (dragging) {
            dragging = false;
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
          }
        });
      }
      const tlScroll = document.getElementById('timeline-scroll');
      if (tlScroll) {
        tlScroll.addEventListener('wheel', handleTimelineWheel, { passive: false });
        tlScroll.addEventListener('dblclick', resetTimelineZoom);
        // Fixed-position tooltip that respects viewport boundaries
        var tlTip = document.getElementById('tl-tooltip');
        tlScroll.addEventListener('mouseover', function(e) {
          var bar = e.target.closest('[data-tooltip]');
          if (!bar || !tlTip) return;
          var rect = bar.getBoundingClientRect();
          var text = bar.getAttribute('data-tooltip').replace(/\\n/g, '\n');
          tlTip.textContent = text;
          tlTip.style.display = 'block';
          var tipRect = tlTip.getBoundingClientRect();
          var top = rect.top - tipRect.height - 8;
          var left = rect.left + (rect.width - tipRect.width) / 2;
          if (top < 4) top = rect.bottom + 4;
          if (left < 4) left = 4;
          if (left + tipRect.width > window.innerWidth - 4) left = window.innerWidth - tipRect.width - 4;
          tlTip.style.top = top + 'px';
          tlTip.style.left = left + 'px';
        });
        tlScroll.addEventListener('mouseout', function(e) {
          if (tlTip && (!e.relatedTarget || !e.relatedTarget.closest('[data-tooltip]'))) tlTip.style.display = 'none';
        });
      }

      // Resize: re-render timeline for auto-fit recalculation
      let resizeTimer;
      window.addEventListener('resize', function() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(function() {
          if (S.view === 'timeline') renderTimeline();
        }, 150);
      });
    };

    function renderAll() {
      updateStats();
      if (S.view === 'list') renderList();
      if (S.view === 'weekly') renderWeekly();
      if (S.view === 'month') renderMonth();
      if (S.view === 'timeline') renderTimeline();
      if (S.view === 'event') renderEvents();
      if (S.view === 'reminder') renderReminders();
    }

    function setMeta() {
      const d = new Date();
      const el = document.getElementById('page-meta');
      if (el) el.textContent = DAYS_ID[d.getDay()] + ', ' + d.getDate() + ' ' + MONTHS_ID[d.getMonth()] + ' ' + d.getFullYear();
    }

    function updateStats() {
      const ts = S.tasks.filter(t => (t.type || 'task') === 'task');
      const cs = S.tasks.filter(t => t.type === 'campaign');
      const done = ts.filter(t => t.done).length;
      const prog = ts.length ? Math.round((done / ts.length) * 100) : 0;

      document.getElementById('stat-progress-val').textContent = prog + '%';
      document.getElementById('stat-progress-bar').style.width = prog + '%';
      document.getElementById('stat-pending-val').textContent = ts.length - done;
      document.getElementById('stat-campaign-val').textContent = cs.length;
      const nc = document.getElementById('nav-count-list');
      if (nc) nc.textContent = ts.length - done;
      var ec = document.getElementById('nav-count-event');
      if (ec) ec.textContent = S.events.length;
      var rc = document.getElementById('nav-count-reminder');
      if (rc) rc.textContent = S.reminders.length;
    }

    function switchView(v, el) {
      S.view = v;
      // Reset Detail Panel & Selection on Tab Switch
      S.selectedId = null;
      const detailEl = document.getElementById('detail-panel');
      if (detailEl) {
        detailEl.innerHTML = '<div style="text-align:center;padding:20px;opacity:0.4;">Klik agenda atau tanggal untuk melihat detail</div>';
        detailEl.classList.add('empty');
      }

      document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
      el.classList.add('active');
      document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
      document.getElementById('view-' + v).classList.add('active');
      // Toggle zoom cursor on timeline scroll
      const tlScroll = document.getElementById('timeline-scroll');
      if (tlScroll) tlScroll.classList.toggle('zoom-active', v === 'timeline');
      const titleEl = document.getElementById('page-title');
      if (titleEl) titleEl.textContent = v === 'list' ? 'Task List' : (v === 'weekly' ? 'Weekly Plan' : v === 'month' ? 'Month View' : v === 'timeline' ? 'Timeline' : v === 'event' ? 'Event' : 'Reminder');
      renderAll();
    }

    // List View
    function setFilter(f, el) {
      S.filter = f;
      el.parentNode.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      el.classList.add('active');
      renderList();
    }
    function handleSearch(val) { S.q = val.toLowerCase(); renderList(); }

    function renderList() {
      const filtered = S.tasks.filter(t => {
        if (t.type === 'campaign') return false;
        if (S.filter === 'pending' && t.done) return false;
        if (S.filter === 'done' && !t.done) return false;
        if (S.q && !t.title.toLowerCase().includes(S.q) && !(t.description || '').toLowerCase().includes(S.q)) return false;
        if (S.activeTags.length) {
          const itemTags = (t.tag || '').split(',').map(x => x.trim().toLowerCase());
          if (!S.activeTags.some(tag => itemTags.includes(tag.toLowerCase()))) return false;
        }
        if (S.activePriorities.length && !S.activePriorities.includes(t.priority)) return false;
        return true;
      });

      const el = document.getElementById('task-list-el');
      if (!filtered.length) {
        el.innerHTML = `<div style="text-align:center;padding:40px;opacity:0.4;">Tidak ada task ditemukan 📭</div>`;
        buildTagFilters();
        buildPriorityFilters();
        return;
      }

      const BATCH_SIZE = 30;
      const total = filtered.length;
      const batch = filtered.slice(0, (S.listPage + 1) * BATCH_SIZE);
      const hasMore = batch.length < total;

      el.innerHTML = batch.map(t => `
        <div class="task-row ${t.done ? 'done' : ''} ${S.selectedId === t.id ? 'selected' : ''}" onclick="selectTask('${t.id}')" style="border-left:3px solid ${t.color || '#6366f1'}">
          <div class="task-check ${t.done ? 'checked' : ''}" onclick="event.stopPropagation();toggleDone('${t.id}')"></div>
          <div class="task-main">
            <div class="task-name">${esc(t.title)}</div>
            <div class="task-sub">
              <span>📅 ${t.date || 'No Date'}</span>
              ${t.tag ? `<span># ${esc(t.tag)}</span>` : ''}
              <span class="badge" style="background:${t.priority === 'high' ? '#fef2f2' : '#eff6ff'};color:${t.priority === 'high' ? '#ef4444' : '#3b82f6'};">${t.priority === 'high' ? '🏁 Tinggi' : t.priority === 'low' ? '🐌 Rendah' : '🔵 Sedang'}</span>
            </div>
          </div>
        </div>
      `).join('');

      if (hasMore) {
        const remaining = total - batch.length;
        el.innerHTML += `<div class="load-more" onclick="S.listPage++;renderList();buildTagFilters();">Muat ${Math.min(BATCH_SIZE, remaining)} lagi (${remaining} tersisa)</div>`;
      }
      buildTagFilters();
      buildPriorityFilters();
    }

    function buildTagFilters() {
      const tags = [...new Set(S.tasks.filter(t => t.tag).flatMap(t => t.tag.split(',').map(x => x.trim())).filter(Boolean))];
      const el = document.getElementById('tag-filters');
      if (!el) return;
      if (!tags.length) { el.innerHTML = ''; return; }
      el.innerHTML = tags.map(tag => {
        const active = S.activeTags.includes(tag) ? ' active' : '';
        return `<span class="filter-chip${active}" onclick="toggleTagFilter('${esc(tag)}')">#${esc(tag)}</span>`;
      }).join('');
    }

    function toggleTagFilter(tag) {
      const idx = S.activeTags.indexOf(tag);
      if (idx > -1) S.activeTags.splice(idx, 1); else S.activeTags.push(tag);
      S.listPage = 0;
      buildTagFilters();
      renderList();
    }

    function buildPriorityFilters() {
      const el = document.getElementById('priority-filters');
      if (!el) return;
      const priorities = [
        { key: 'high', label: '🏁 Tinggi' },
        { key: 'medium', label: '🔵 Sedang' },
        { key: 'low', label: '🐌 Rendah' }
      ];
      el.innerHTML = priorities.map(p => {
        const active = S.activePriorities.includes(p.key) ? ' active' : '';
        return `<span class="filter-chip${active}" onclick="togglePriorityFilter('${p.key}')">${p.label}</span>`;
      }).join('');
    }

    function togglePriorityFilter(p) {
      const idx = S.activePriorities.indexOf(p);
      if (idx > -1) S.activePriorities.splice(idx, 1); else S.activePriorities.push(p);
      S.listPage = 0;
      buildPriorityFilters();
      renderList();
    }

    // Weekly View (STRETCH MATRIX)
    function changeWeek(d) { S.weekOffset += d; renderWeekly(); }
    function goThisWeek() { S.weekOffset = 0; renderWeekly(); }

    function renderWeekly() {
      const d = new Date();
      const start = new Date(d);
      start.setDate(d.getDate() - (d.getDay() === 0 ? 6 : d.getDay() - 1) + (S.weekOffset * 7));
      start.setHours(0, 0, 0, 0);
      const end = new Date(start); end.setDate(start.getDate() + 6);

      const weekNum = getWeekNumber(start);
      document.getElementById('week-label').textContent = `W-${weekNum} · ${start.getDate()} ${MONTHS_ID[start.getMonth()]} - ${end.getDate()} ${MONTHS_ID[end.getMonth()]} ${end.getFullYear()}`;

      const days = [];
      for (let i = 0; i < 7; i++) {
        let dd = new Date(start); dd.setDate(start.getDate() + i);
        days.push(dateStr(dd));
      }

      fetchHolidays(start.getFullYear());
      fetchHolidays(end.getFullYear());

      const slots = {};
      days.forEach(ds => slots[ds] = []);

      const tasks = S.tasks.filter(t => {
        if (!t.date) return false;
        const s = t.date, e = t.enddate || t.date;
        return s <= days[6] && e >= days[0];
      });

      tasks.sort((a, b) => {
        if (a.type !== b.type) return a.type === 'campaign' ? -1 : 1;
        return a.date.localeCompare(b.date);
      });

      tasks.forEach(t => {
        const s = t.date, e = t.enddate || t.date;
        let slot = 0, found = false;
        while (!found) {
          let free = true;
          for (let i = 0; i < 7; i++) {
            if (days[i] >= s && days[i] <= e && slots[days[i]][slot]) { free = false; break; }
          }
          if (free) found = true; else slot++;
        }
        for (let i = 0; i < 7; i++) { if (days[i] >= s && days[i] <= e) slots[days[i]][slot] = t; }
      });

      const today = dateStr(new Date());
      document.getElementById('week-grid').innerHTML = days.map((ds, idx) => {
        const dObj = new Date(start); dObj.setDate(start.getDate() + idx);
        const daySlots = slots[ds] || [];
        const chips = daySlots.map(t => {
          if (!t) return `<div class="week-chip-spacer"></div>`;
          const e = t.enddate || t.date;
          let cls = 'single', text = true;
          if (t.date !== e) {
            if (ds === t.date) cls = 'start';
            else if (ds === e) { cls = 'end'; text = false; }
            else { cls = 'mid'; text = false; }
            if (idx === 0) text = true;
          }
          const isC = t.type === 'campaign';
          // On mobile schedule view, we want text on EVERY day card
          const isMobile = window.innerWidth <= 650;
          const showText = text || isMobile || isC;

          const bg = isC ? t.color : hexAlpha(t.color || '#ccc', 0.1);
          const co = isC ? '#fff' : '#000';
          const br = isC ? 'none' : `3px solid ${t.color || '#ccc'}`;
          return `<div class="week-chip ${cls}" style="background:${bg};color:${co};border-left:${br};${t.done ? 'opacity:0.55;text-decoration:line-through;' : ''}" draggable="true" ondragstart="dragStart(event,'${t.id}')" onclick="event.stopPropagation();selectTask('${t.id}')">${showText ? esc(t.title) : '&nbsp;'}${!isC ? '<span class="quick-toggle" onclick="event.stopPropagation();toggleDone(\'' + t.id + '\')" style="margin-left:auto;font-size:10px;opacity:0.6;cursor:pointer;flex-shrink:0;padding:0 2px;">' + (t.done ? '↩' : '✓') + '</span>' : ''}</div>`;
        }).join('');

        const holi = holidaysCache[ds];
        const isHoliCls = holi ? (holi.type === 'leave' ? 'is-leave' : 'is-holiday') : '';
        const holiHtml = holi ? `<div class="holiday-label ${holi.type === 'leave' ? 'leave-label' : ''}">${esc(holi.name)}</div>` : '';
        const dateNum = ds === today ? `<span class="today-marker">${dObj.getDate()}</span>` : dObj.getDate();

        // ↓ Clicking the day header shows a list of items for that day
        return `<div class="week-col ${ds === today ? 'today' : ''} ${isHoliCls}" ondragover="dragOver(event)" ondrop="dropTask(event,'${ds}')" ondragleave="dragLeave(event)">
          <div class="week-col-head" onclick="showDayDetail('${ds}')" style="cursor:pointer;" title="Lihat semua agenda tanggal ini">
            <div style="display:flex;align-items:center;gap:8px;">
              <div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;">${DAYS_SHORT[dObj.getDay()]}</div>
              <div style="font-size:18px;font-weight:700;">${dateNum}</div>
            </div>
            ${holiHtml}
          </div>
          <div class="week-items">${chips || `<div class="week-empty">—</div>`}</div>
        </div>`;
      }).join('');
    }

    // Month View
    function toggleMonthEvents(el) { S.showMonthEvents = el.checked; renderMonth(); }
    function toggleMonthReminders(el) { S.showMonthReminders = el.checked; renderMonth(); }
    function toggleMonthTasks(el) { S.showMonthTasks = el.checked; renderMonth(); }
    function changeMonth(d) { S.calMonth += d; if (S.calMonth > 11) { S.calMonth = 0; S.calYear++; } if (S.calMonth < 0) { S.calMonth = 11; S.calYear--; } renderMonth(); }
    function goThisMonth() { S.calYear = new Date().getFullYear(); S.calMonth = new Date().getMonth(); renderMonth(); }

    function renderMonth() {
      const y = S.calYear, m = S.calMonth;
      document.getElementById('cal-month-label').textContent = MONTHS_ID[m] + ' ' + y;

      const first = (new Date(y, m, 1).getDay() || 7) - 1;
      const daysIn = new Date(y, m + 1, 0).getDate();
      const cells = [];
      const prevDays = new Date(y, m, 0).getDate();
      for (let i = first - 1; i >= 0; i--) cells.push({ d: prevDays - i, m: m - 1, y: m === 0 ? y - 1 : y, other: true });
      for (let d = 1; d <= daysIn; d++) cells.push({ d, m, y, other: false });
      while (cells.length < 42) { let n = cells.length - daysIn - first + 1; cells.push({ d: n, m: m + 1, y: m === 11 ? y + 1 : y, other: true }); }

      const days = cells.map(c => c.y + '-' + pad(c.m + 1) + '-' + pad(c.d));
      const slots = {}; days.forEach(ds => slots[ds] = []);

      fetchHolidays(S.calYear);

      // Collect all visible items from all layers
      var allItems = [];
      // Tasks + Campaigns
      allItems = allItems.concat(S.tasks.filter(function(t) {
        if (!t.date) return false;
        if (t.type === 'task' && !S.showMonthTasks) return false;
        var s = t.date, e = t.enddate || t.date;
        return s <= days[41] && e >= days[0];
      }));
      // Events
      if (S.showMonthEvents) {
        allItems = allItems.concat(S.events.filter(function(e) {
          if (!e.date) return false;
          var s = e.date, en = e.enddate || e.date;
          return s <= days[41] && en >= days[0];
        }));
      }
      // Reminders
      if (S.showMonthReminders) {
        allItems = allItems.concat(S.reminders.filter(function(r) {
          if (!r.date) return false;
          return r.date <= days[41] && (r.enddate || r.date) >= days[0];
        }));
      }

      allItems.forEach(function(t) {
        var s = t.date, e = t.enddate || t.date;
        var slot = 0, found = false;
        while (!found) {
          var free = true;
          for (var i = 0; i < 42; i++) { if (days[i] >= s && days[i] <= e && slots[days[i]][slot]) { free = false; break; } }
          if (free) found = true; else slot++;
        }
        for (var i = 0; i < 42; i++) { if (days[i] >= s && days[i] <= e) slots[days[i]][slot] = t; }
      });

      const today = dateStr(new Date());
      document.getElementById('cal-grid').innerHTML = cells.map((c, idx) => {
        const ds = days[idx];
        const daySlots = (slots[ds] || []).filter(Boolean); // Compact slots (filter out undefined)

        const MAX_SLOTS = 3;
        const visibleSlots = daySlots.slice(0, MAX_SLOTS);
        const hasMore = daySlots.length > MAX_SLOTS;

        const chips = visibleSlots.map(function(t) {
          if (!t) return '<div class="cal-chip-spacer"></div>';
          var e = t.enddate || t.date;
          var cls = 'single', text = true;
          if (t.date !== e) {
            if (ds === t.date) cls = 'start'; else if (ds === e) { cls = 'end'; text = false; } else { cls = 'mid'; text = false; }
            if (idx % 7 === 0) text = true;
          }
          var isC = t.type === 'campaign', isE = t.type === 'event', isR = t.type === 'reminder';
          var bg, border, txtColor, extraCls = '';
          if (isC) { bg = t.color; border = 'none'; txtColor = '#fff'; }
          else if (isE) { bg = hexAlpha(t.color || '#14b8a6', 0.08); border = '2px dashed ' + t.color; txtColor = '#0f172a'; }
          else { bg = hexAlpha(t.color, 0.08); border = '2px solid ' + t.color; txtColor = '#0f172a'; }
          var doneStyle = (t.done || t.status === 'Selesai') ? 'opacity:0.55;text-decoration:line-through;' : '';
          return '<div class="cal-chip ' + cls + (isR ? ' cal-chip-reminder' : '') + '" style="background:' + bg + ';color:' + txtColor + ';border-left:' + border + ';' + doneStyle + '" onclick="event.stopPropagation();selectTask(\'' + t.id + '\')"><span>' + (text ? esc(t.title) : '&nbsp;') + '</span>' + (isC ? '' : '<span class="quick-toggle" onclick="event.stopPropagation();toggleDone(\'' + t.id + '\')" style="margin-left:auto;font-size:10px;opacity:0.6;cursor:pointer;flex-shrink:0;padding:0 2px;">' + (t.done ? '↩' : '✓') + '</span>') + '</div>';
        }).join('');

        // Dots for Mobile View
        const dots = daySlots.map(t => `<div class="dot" style="background:${t.color || '#ccc'}"></div>`).join('');

        const moreLabel = hasMore ? `<div class="more-chip" onclick="event.stopPropagation();showDayDetail('${ds}')">+${daySlots.length - MAX_SLOTS} lagi</div>` : '';

        const holi = holidaysCache[ds];
        const isHoliCls = holi ? (holi.type === 'leave' ? 'is-leave' : 'is-holiday') : '';
        const holiHtml = holi ? `<div class="holiday-label ${holi.type === 'leave' ? 'leave-label' : ''}">${esc(holi.name)}</div>` : '';
        const dateHtml = ds === today ? `<span class="today-marker">${c.d}</span>` : c.d;

        return `<div class="cal-cell ${c.other ? 'other' : ''} ${ds === today ? 'today' : ''} ${isHoliCls}" onclick="showDayDetail('${ds}')" ondragover="dragOver(event)" ondrop="dropTask(event,'${ds}')" ondragleave="dragLeave(event)">
          <div class="cal-cell-num">${dateHtml}${holiHtml}</div>${chips}${moreLabel}
          <div class="day-dots">${dots}</div>
        </div>`;
      }).join('');
    }

    // ═══════════════════════════════════════
    // TIMELINE VIEW
    // ═══════════════════════════════════════
    function changeTimelineMonth(d) {
      S.timelineMonth += d;
      if (S.timelineMonth > 11) { S.timelineMonth = 0; S.timelineYear++; }
      if (S.timelineMonth < 0) { S.timelineMonth = 11; S.timelineYear--; }
      S.timelineSelectedDate = null;
      renderTimeline();
    }
    function goThisTimelineMonth() {
      S.timelineYear = new Date().getFullYear();
      S.timelineMonth = new Date().getMonth();
      S.timelineSelectedDate = null;
      renderTimeline();
    }

    function getTimelineItems() {
      const monthStart = S.timelineYear + '-' + pad(S.timelineMonth + 1) + '-01';
      const daysIn = new Date(S.timelineYear, S.timelineMonth + 1, 0).getDate();
      const monthEnd = S.timelineYear + '-' + pad(S.timelineMonth + 1) + '-' + pad(daysIn);
      var showT = document.getElementById('toggle-tl-tasks') ? document.getElementById('toggle-tl-tasks').checked : false;
      var showE = document.getElementById('toggle-tl-events') ? document.getElementById('toggle-tl-events').checked : false;
      var showR = document.getElementById('toggle-tl-reminders') ? document.getElementById('toggle-tl-reminders').checked : false;
      var items = [];
      items = items.concat(S.tasks.filter(function(t) {
        if (!t.date) return false;
        if (t.type === 'task' && !showT) return false;
        var s = t.date, e = t.enddate || t.date;
        return s <= monthEnd && e >= monthStart;
      }));
      if (showE) {
        items = items.concat(S.events.filter(function(e) {
          if (!e.date) return false;
          var s = e.date, en = e.enddate || e.date;
          return s <= monthEnd && en >= monthStart;
        }));
      }
      if (showR) {
        items = items.concat(S.reminders.filter(function(r) {
          if (!r.date) return false;
          return r.date <= monthEnd && (r.enddate || r.date) >= monthStart;
        }));
      }
      return items.sort(function(a, b) {
        var order = { campaign: 0, event: 1, task: 2, reminder: 3 };
        var oa = order[a.type] || 4, ob = order[b.type] || 4;
        if (oa !== ob) return oa - ob;
        return a.date.localeCompare(b.date);
      });
    }

    function getTimelineDayWidth() {
      const container = document.getElementById('timeline-scroll');
      if (!container) return 40;
      const labelW = S.timelineLabelWidth || 180;
      const avail = container.clientWidth - labelW;
      if (avail <= 0) return 40;
      if (S.timelineZoom <= 0) {
        // Auto-fit: all days fit the screen
        const daysIn = new Date(S.timelineYear, S.timelineMonth + 1, 0).getDate();
        return Math.max(20, avail / daysIn);
      }
      return S.timelineZoom;
    }

    function renderTimeline() {
      const y = S.timelineYear, m = S.timelineMonth;
      document.getElementById('timeline-month-label').textContent = MONTHS_ID[m] + ' ' + y;
      const daysIn = new Date(y, m + 1, 0).getDate();
      const zoom = getTimelineDayWidth();
      const scrollEl = document.getElementById('timeline-scroll');
      const labelW = S.timelineLabelWidth || 180;
      scrollEl.style.setProperty('--tl-days', daysIn);
      scrollEl.style.setProperty('--tl-day-w', zoom + 'px');
      scrollEl.style.setProperty('--tl-label-w', labelW + 'px');
      document.getElementById('timeline-header').style.setProperty('--tl-day-w', zoom + 'px');
      document.getElementById('timeline-header').style.setProperty('--tl-label-w', labelW + 'px');

      // Zoom info
      const infoEl = document.getElementById('tl-zoom-info');
      if (infoEl) {
        if (S.timelineZoom <= 0) {
          infoEl.textContent = '🔍 Auto';
        } else {
          const avail = scrollEl.clientWidth - labelW;
          const vis = Math.round(avail / S.timelineZoom);
          infoEl.textContent = '🔍 ' + vis + ' hr';
        }
      }

      renderTimelineHeader(y, m, daysIn);
      renderTimelineBars(y, m, daysIn);
      // Ensure body rows extend to match header width for proper scroll
      const bodyRows = document.querySelector('.timeline-body-rows');
      if (bodyRows) bodyRows.style.minWidth = (labelW + daysIn * zoom) + 'px';
      // Arahkan detail ke main panel
      if (S.selectedId) renderDetail();
    }

    function renderTimelineHeader(year, month, daysIn) {
      const DAY_SHORT = ['MIN', 'SEN', 'SEL', 'RAB', 'KAM', 'JUM', 'SAB'];
      const todayStr = dateStr(new Date());
      let html = '<div class="timeline-header-row"><div class="tl-corner">📅 ' + MONTHS_ID[month].slice(0, 3) + '</div>';
      for (let d = 1; d <= daysIn; d++) {
        const ds = year + '-' + pad(month + 1) + '-' + pad(d);
        const isToday = ds === todayStr;
        const dObj = new Date(year, month, d);
        const isWeekend = dObj.getDay() === 0 || dObj.getDay() === 6;
        const isSunday = dObj.getDay() === 0;
        const holi = holidaysCache[ds];
        const cls = (isToday ? ' today' : '') + (isSunday ? ' sunday' : '') + (isWeekend && !isToday ? ' weekend' : '') + (holi ? ' holiday' : '');
        const dayName = '<span class="tl-day-name">' + DAY_SHORT[dObj.getDay()] + '</span>';
        const holiName = holi ? '<span class="holi-name">' + esc(holi.name.split(' ')[0]) + '</span>' : '';
        html += '<div class="tl-day-header' + cls + '" onclick="selectTimelineDate(\'' + ds + '\')">' + dayName + d + holiName + '</div>';
      }
      html += '</div>';
      document.getElementById('timeline-header').innerHTML = html;
    }

    function renderTimelineBars(year, month, daysIn) {
      const items = getTimelineItems();
      const monthStart = year + '-' + pad(month + 1) + '-01';
      const monthEnd = year + '-' + pad(month + 1) + '-' + pad(daysIn);
      const z = getTimelineDayWidth();

      if (!items.length) {
        document.getElementById('timeline-body').innerHTML = '<div style="text-align:center;padding:40px;opacity:0.4;">Tidak ada data bulan ini</div>';
        return;
      }

      let gridLinesHtml = '';
      for (let d = 1; d <= daysIn; d++) {
        const dObj = new Date(year, month, d);
        const isSunday = dObj.getDay() === 0;
        const extra = isSunday ? 'width:' + z + 'px;' : '';
        gridLinesHtml += '<div class="tl-grid-line' + (isSunday ? ' weekend' : '') + '" style="left:' + ((d - 1) * z) + 'px;' + extra + '"></div>';
      }

      let rowsHtml = '';
      items.forEach(function(item) {
        var isCampaign = item.type === 'campaign';
        var isEvent = item.type === 'event';
        var isReminder = item.type === 'reminder';
        var s = item.date < monthStart ? 1 : parseInt(item.date.split('-')[2], 10);
        var endD = item.enddate || item.date;
        var e = endD > monthEnd ? daysIn : parseInt(endD.split('-')[2], 10);
        var leftPx = (s - 1) * z;
        var widthPx = (e - s + 1) * z;
        var bg, color, border;
        if (isCampaign) { bg = item.color; color = '#1e293b'; border = 'none'; }
        else if (isEvent) { bg = 'rgba(' + hexToRgbArr(item.color).join(',') + ',0.15)'; color = '#1e293b'; border = '2px dashed ' + item.color; }
        else if (isReminder) { bg = '#14b8a6'; color = '#1e293b'; border = '3px solid #0d9488'; }
        else { bg = 'rgba(' + hexToRgbArr(item.color).join(',') + ',0.12)'; color = '#1e293b'; border = '3px solid ' + item.color; }
        var cls = 'timeline-bar';
        if (s === e) cls += ' single'; else if (s === parseInt(item.date.split('-')[2], 10) || item.date < monthStart) cls += ' start'; else if (e === daysIn || e === parseInt(endD.split('-')[2], 10)) cls += ' end'; else cls += ' mid';
        if (isCampaign) cls += ' campaign'; else if (isEvent) cls += ' event'; else if (isReminder) cls += ' reminder'; else cls += ' task';
        if (item.done) cls += ' done';

        var tagStr = item.tag ? '\\n#' + item.tag.replace(/,/g, ' #') : '';
        var descStr = item.description ? '\\n' + esc(item.description.substring(0, 100)) : '';
        var tooltip = esc(item.title) + '\\n' + formatShortDate(item.date) + (item.enddate && item.enddate !== item.date ? ' → ' + formatShortDate(item.enddate) : '') + tagStr + descStr;

        var barHtml = '<div class="' + cls + '" style="left:' + leftPx + 'px;width:' + widthPx + 'px;background:' + bg + ';color:' + color + ';border-left:' + border + ';" onclick="selectTask(\'' + item.id + '\')" data-tooltip="' + tooltip + '">' + esc(item.title) + (isCampaign ? '' : '<span class="quick-toggle" onclick="event.stopPropagation();toggleDone(\'' + item.id + '\')">' + (item.done ? '↩' : '✓') + '</span>') + '</div>';

        var labelIcon = isCampaign ? '📢' : (isEvent ? '📅' : (item.done ? '✅' : '📝'));

        rowsHtml += '<div class="timeline-row">';
        rowsHtml += '<div class="timeline-row-label" onclick="selectTask(\'' + item.id + '\')" data-tooltip="' + tooltip + '">' + labelIcon + ' ' + esc(item.title) + '</div>';
        rowsHtml += '<div class="timeline-row-track">' + barHtml + gridLinesHtml + '</div>';
        rowsHtml += '</div>';
      });

      document.getElementById('timeline-body').innerHTML = '<div class="timeline-body-rows">' + rowsHtml + '</div>';
    }

    function hexToRgbArr(hex) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return [r, g, b];
    }

    function setTimelineZoom(px) {
      // px <= 0 resets to auto-fit
      S.timelineZoom = px <= 0 ? 0 : px;
      renderTimeline();
    }

    function resetTimelineZoom() {
      S.timelineZoom = 0;
      renderTimeline();
    }

    function handleTimelineWheel(e) {
      const el = document.getElementById('timeline-scroll');
      if (!el || !el.contains(e.target)) return;
      // Only zoom when Ctrl/Meta is held, OR if we detect pinch-like trackpad
      // We'll use deltaY to adjust visible day count
      const labelW = S.timelineLabelWidth || 180;
      const avail = el.clientWidth - labelW;
      if (avail <= 0) return;

      const daysIn = new Date(S.timelineYear, S.timelineMonth + 1, 0).getDate();
      // Current visible days
      const curZoom = S.timelineZoom <= 0 ? avail / daysIn : S.timelineZoom;
      const curVis = avail / curZoom;

      let newVis;
      if (e.deltaY < 0) {
        // Zoom in: fewer days
        newVis = Math.max(7, Math.round(curVis / 1.2));
      } else {
        // Zoom out: more days
        newVis = Math.min(daysIn, Math.round(curVis * 1.2));
      }

      const newZoom = avail / newVis;

      S.timelineZoom = (newVis >= daysIn - 1) ? 0 : newZoom;
      renderTimeline();
      e.preventDefault();
    }

    function selectTimelineDate(ds) {
      S.timelineSelectedDate = S.timelineSelectedDate === ds ? null : ds;
      // Route ke main detail panel
      if (S.timelineSelectedDate) {
        showDayDetail(S.timelineSelectedDate);
      } else {
        const el = document.getElementById('detail-panel');
        if (el) {
          el.innerHTML = '<div style="text-align:center;padding:20px;opacity:0.4;">Klik agenda atau tanggal untuk melihat detail</div>';
          el.classList.add('empty');
        }
      }
    }

        rows += '<div class="p-label">' + esc(item.title) + '</div><div class="p-track">' + sunMarkers + bar + '</div>';
      });

      // Legend — group campaigns by title+description
      const campGroups = {};
      const nonCamps = [];
      items.forEach(item => {
        if (item.type === 'campaign') {
          const key = item.title.trim().toLowerCase() + '|||' + (item.description || '').trim().toLowerCase();
          if (!campGroups[key]) campGroups[key] = { title: item.title, color: item.color, description: item.description, dates: [] };
          campGroups[key].dates.push({ start: item.date, end: item.enddate || item.date });
        } else {
          nonCamps.push(item);
        }
      });
      let leg = '';
      Object.values(campGroups).forEach(g => {
        g.dates.sort((a, b) => a.start.localeCompare(b.start));
        const datesHtml = g.dates.map(d => {
          const dr = d.start !== d.end ? formatShortDate(d.start) + ' → ' + formatShortDate(d.end) : formatShortDate(d.start);
          return '<span style="background:#f1f5f9;padding:2px 4px;border-radius:3px;margin-right:4px;display:inline-block;margin-bottom:2px;border:1px solid #e2e8f0;color:#475569;">📅 ' + dr + '</span>';
        }).join('');
        leg += '<div class="tpi" style="border-left:4px solid ' + g.color + ';"><div class="tpit">📢 ' + esc(g.title) + '</div><div class="tpid">' + datesHtml + '</div><div class="tpidesc">' + esc(g.description || '—') + '</div></div>';
      });
      nonCamps.forEach(item => {
        const dr = item.enddate && item.enddate !== item.date ? formatShortDate(item.date) + ' → ' + formatShortDate(item.enddate) : formatShortDate(item.date);
        const tags = item.tag ? ' &nbsp;#' + item.tag.replace(/,/g, ' #') : '';
        const prio = item.priority ? ' · ' + (item.priority === 'high' ? 'Tinggi' : item.priority === 'low' ? 'Rendah' : 'Sedang') : '';
        const st = item.done ? ' ✓ Selesai' : '';
        leg += '<div class="tpi" style="border-left:4px solid ' + item.color + ';"><div class="tpit">📝 ' + esc(item.title) + '</div><div class="tpid"><strong>' + dr + '</strong>' + tags + prio + st + '</div><div class="tpidesc">' + esc(item.description || '—') + '</div></div>';
      });

      const html = '<!DOCTYPE html><html><head><title>Cetak Timeline - ' + monthName + '</title><style>@page{size:landscape;margin:8mm;}*{box-sizing:border-box;}body{font-family:\'Plus Jakarta Sans\',sans-serif;margin:0;padding:0;font-size:12px;color:#1e293b;background:#fff;}.p-grid{display:grid;grid-template-columns:130px repeat(' + daysIn + ',1fr);gap:0;}.p-corner{padding:4px 8px;font-weight:800;font-size:11px;border-bottom:1px solid #e5e7eb;grid-column:1;color:#1e293b;}.p-label{grid-column:1;padding:3px 8px;font-size:9px;font-weight:600;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#1e293b;background:#fff;}.p-track{grid-column:2/-1;display:grid;grid-template-columns:repeat(' + daysIn + ',1fr);border-bottom:1px solid rgba(0,0,0,0.05);min-height:22px;align-items:center;position:relative;}.pdh{padding:3px 3px;text-align:center;font-size:8px;font-weight:700;border-bottom:1px solid rgba(0,0,0,0.07);border-right:1px solid rgba(0,0,0,0.04);color:#475569;}.pdh.today{background:#3b82f6;color:#fff;}.pdh.weekend{background:rgba(239,68,68,0.08);}.pdh.holiday{color:#ef4444;}.pdn{display:block;font-size:6px;font-weight:400;opacity:0.5;text-transform:uppercase;letter-spacing:0.5px;}.phn{font-size:6px;display:block;font-weight:400;}.tpb{height:16px;border-radius:3px;font-size:7px;display:flex;align-items:center;padding:0 5px;white-space:nowrap;overflow:visible;font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,0.08);-webkit-print-color-adjust:exact;print-color-adjust:exact;margin:1px 0;min-width:0;}.tpb.camp{color:#1e293b;}.tpb.task{border-left:2px solid;color:#1e293b;}.tpb-text{white-space:nowrap;overflow:visible;}.p-sun{position:absolute;top:0;bottom:0;z-index:3;background:rgba(239,68,68,0.08);}.p-leg{margin-top:16px;padding-top:12px;border-top:1.5px solid #cbd5e1;page-break-before:always;}.p-leg h2{margin:0 0 10px;font-size:14px;color:#1e293b;}.p-lst{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;}.tpi{break-inside:avoid;margin-bottom:0;padding:8px 12px;background:#f8fafc;border-bottom:1px solid #e5e7eb;border-radius:6px;}.tpit{font-weight:700;font-size:10px;color:#1e293b;margin-bottom:2px;}.tpid{font-size:9px;color:#475569;line-height:1.6;}.tpidesc{font-size:9px;color:#334155;margin-top:3px;line-height:1.5;white-space:pre-wrap;}@media print{.no-print{display:none!important;}}</style></head><body><div class="p-grid">' + hd + rows + '</div><div class="p-leg"><h2>Daftar Campaign & Tugas - ' + monthName + '</h2><div class="p-lst">' + leg + '</div></div></body></html>';
      const win = window.open('', '_blank');
      win.document.write(html);
      win.document.close();
      win.focus();
      setTimeout(function() { win.print(); }, 300);
    }

    // ═══════════════════════════════════════
    // UX FEATURES
    // ═══════════════════════════════════════

    // Week Number
    function getWeekNumber(d) {
      const temp = new Date(d.valueOf());
      const dayNum = (d.getDay() + 6) % 7;
      temp.setDate(temp.getDate() - dayNum + 3);
      const firstThursday = temp.valueOf();
      temp.setMonth(0, 1);
      if (temp.getDay() !== 4) temp.setMonth(0, 1 + ((4 - temp.getDay()) + 7) % 7);
      return 1 + Math.ceil((firstThursday - temp) / 604800000);
    }

    // Undo stack
    function pushUndo() {
      S.undoStack.push(JSON.parse(JSON.stringify(S.tasks)));
      if (S.undoStack.length > 50) S.undoStack.shift();
      S.redoStack = [];
    }

    function undo() {
      if (!S.undoStack.length) return;
      S.redoStack.push(JSON.parse(JSON.stringify(S.tasks)));
      S.tasks = S.undoStack.pop();
      renderAll();
      renderDetail();
      toast('↩ Perubahan dibatalkan');
    }

    function showUndoSnackbar(msg, onUndo) {
      const el = document.getElementById('toast');
      if (!el) return;
      el.innerHTML = msg + ' <span style="cursor:pointer;font-weight:700;text-decoration:underline;margin-left:8px;" onclick="' + onUndo + ';this.parentElement.style.opacity=0;">Batalkan</span>';
      el.style.background = '#1e293b';
      el.style.transform = 'translateX(-50%) translateY(0)';
      el.style.opacity = '1';
      clearTimeout(el._timeout);
      el._timeout = setTimeout(function() {
        el.style.opacity = '0';
        el.style.transform = 'translateX(-50%) translateY(30px)';
      }, 5000);
    }

    // Override deleteTask with undo
    async function deleteTask() {
      const id = document.getElementById('edit-id').value;
      if (!id || !confirm('Hapus agenda ini?')) return;
      var type = document.getElementById('f-type').value;

      if (type === 'event' || type === 'reminder') {
        closeModal();
        try {
          await api('deleteCalendarItem', { id: id, type: type });
          await api('getCalendarData');
          renderAll();
          toast('✓ ' + (type === 'event' ? 'Event' : 'Reminder') + ' dihapus');
        } catch (e) { toast('Gagal menghapus!', true); }
        return;
      }

      pushUndo();
      const deleted = S.tasks.find(function(x) { return x.id === id; });
      S.tasks = S.tasks.filter(function(x) { return x.id !== id; });
      closeModal();
      renderAll();
      renderDetail();
      try {
        await api('deleteTask', id);
        showUndoSnackbar('🗑 Agenda dihapus', 'undo()');
        await refreshData(true);
      } catch (e) {
        toast('Gagal menghapus!', true);
      }
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', function(e) {
      // Esc close modal
      if (e.key === 'Escape') {
        const modal = document.getElementById('task-modal');
        if (modal.classList.contains('open')) { closeModal(); return; }
        const dp = document.getElementById('datepicker');
        if (dp.classList.contains('open')) { dp.classList.remove('open'); return; }
      }
      // Ctrl+N new task
      if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
        e.preventDefault();
        openTaskModal(null);
      }
      // Ctrl+F focus search
      if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
        e.preventDefault();
        const search = document.querySelector('.search-box');
        if (search) search.focus();
      }
      // Ctrl+Z undo
      if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
        e.preventDefault();
        undo();
      }
    });

    // Drag & Drop for list view reorder
    let dragItem = null;

    function initDragReorder() {
      document.querySelectorAll('.task-row').forEach(row => {
        row.setAttribute('draggable', 'true');
        row.addEventListener('dragstart', function(e) {
          dragItem = this;
          this.style.opacity = '0.5';
        });
        row.addEventListener('dragend', function(e) {
          this.style.opacity = '1';
          dragItem = null;
          document.querySelectorAll('.task-row').forEach(r => r.style.borderLeft = '');
        });
        row.addEventListener('dragover', function(e) {
          e.preventDefault();
          if (this !== dragItem) {
            this.style.borderLeft = '3px solid var(--accent)';
          }
        });
        row.addEventListener('dragleave', function() {
          this.style.borderLeft = '';
        });
        row.addEventListener('drop', function(e) {
          e.preventDefault();
          this.style.borderLeft = '';
          if (dragItem && this !== dragItem) {
            const parent = this.parentNode;
            const items = [...parent.querySelectorAll('.task-row')];
            const fromIdx = items.indexOf(dragItem);
            const toIdx = items.indexOf(this);
            if (fromIdx > -1 && toIdx > -1) {
              const filtered = S.tasks.filter(t => t.type !== 'campaign');
              const task = filtered[fromIdx];
              if (task) {
                filtered.splice(fromIdx, 1);
                filtered.splice(toIdx, 0, task);
                const campaigns = S.tasks.filter(t => t.type === 'campaign');
                const tasks = S.tasks.filter(t => t.type !== 'campaign');
                const reordered = [];
                filtered.forEach(f => {
                  const found = tasks.find(t => t.id === f.id);
                  if (found) reordered.push(found);
                });
                tasks.forEach(t => { if (!reordered.find(r => r.id === t.id)) reordered.push(t); });
                S.tasks = [...campaigns, ...reordered];
                renderList();
              }
            }
          }
        });
      });
    }

    // Drag & Drop to week/month grid cells
    let dragTaskId = null;

    function dragStart(e, id) {
      dragTaskId = id;
      e.dataTransfer.effectAllowed = 'move';
    }

    function dragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      e.currentTarget.style.background = 'rgba(99,102,241,0.08)';
    }

    function dragLeave(e) {
      e.currentTarget.style.background = '';
    }

    function dropTask(e, targetDate) {
      e.preventDefault();
      e.currentTarget.style.background = '';
      if (!dragTaskId) return;
      const task = S.tasks.find(t => t.id === dragTaskId);
      if (!task || !targetDate) { dragTaskId = null; return; }
      pushUndo();
      const oldDate = task.date;
      if (task.enddate && task.enddate !== task.date) {
        const diff = (new Date(task.enddate) - new Date(task.date)) / 86400000;
        task.date = targetDate;
        task.enddate = dateStr(new Date(new Date(targetDate).getTime() + diff * 86400000));
      } else {
        task.date = targetDate;
        task.enddate = targetDate;
      }
      dragTaskId = null;
      renderAll();
      toast('✓ ' + esc(task.title) + ' dipindahkan ke ' + targetDate);
    }

    // Override renderList to enable drag reorder after render
    const origRenderList = renderList;
    renderList = function() {
      origRenderList();
      initDragReorder();
    };

    // Custom Date Picker
    function openDatePicker(id) {
      S.dpTarget = id;
      const el = document.getElementById(id);
      const pop = document.getElementById('datepicker');

      if (window.innerWidth > 600) {
        const rect = el.getBoundingClientRect();
        pop.style.top = (rect.bottom + 5) + 'px';
        pop.style.left = rect.left + 'px';
        // If nested in a scrolled container, we might need absolute doc position
        if (document.querySelector('.modal-bg.open')) {
          // Inside modal, coordinate space is often viewport-based if modal is fixed
        } else {
          pop.style.top = (window.scrollY + rect.bottom + 5) + 'px';
        }
      } else {
        // Mobile: CSS handles centering via position:fixed
        pop.style.top = '';
        pop.style.left = '';
      }

      pop.classList.add('open');
      renderDP();
    }
    window.onclick = (e) => {
      if (!e.target.closest('.custom-date-container') && !e.target.closest('.datepicker-popover'))
        document.getElementById('datepicker').classList.remove('open');
    };

    function navDP(d) { S.dpMonth += d; if (S.dpMonth > 11) { S.dpMonth = 0; S.dpYear++; } if (S.dpMonth < 0) { S.dpMonth = 11; S.dpYear--; } renderDP(); }
    function renderDP() {
      const y = S.dpYear, m = S.dpMonth;
      document.getElementById('dp-month-label').textContent = MONTHS_ID[m] + ' ' + y;
      const first = (new Date(y, m, 1).getDay() || 7) - 1;
      const days = new Date(y, m + 1, 0).getDate();
      const todayStr = dateStr(new Date());
      let html = '';
      for (let i = 0; i < first; i++) html += `<div class="dp-cell other"></div>`;
      for (let d = 1; d <= days; d++) {
        const ds = y + '-' + pad(m + 1) + '-' + pad(d);
        const isSel = document.getElementById(S.dpTarget).value === ds;
        const isToday = ds === todayStr;
        html += `<div class="dp-cell${isSel ? ' selected' : ''}${isToday ? ' today' : ''}" onclick="selectDP('${ds}')">${d}</div>`;
      }
      document.getElementById('dp-grid').innerHTML = html;
    }
    function selectDP(ds) {
      document.getElementById(S.dpTarget).value = ds;
      document.getElementById('datepicker').classList.remove('open');
      if (S.dpTarget === 'f-date') document.getElementById('f-enddate').value = ds;
    }
    function goToTodayDP() {
      const today = new Date();
      S.dpYear = today.getFullYear();
      S.dpMonth = today.getMonth();
      const ds = dateStr(today);
      selectDP(ds);
      renderDP();
    }
    function clearDateDP() {
      document.getElementById(S.dpTarget).value = '';
      document.getElementById('datepicker').classList.remove('open');
    }

    // CRUD & Modals
    function openTaskModal(id, pre) {
      var t = id ? S.tasks.find(function(x) { return x.id === id; }) : null;
      if (!t) t = id ? S.events.find(function(x) { return x.id === id; }) : null;
