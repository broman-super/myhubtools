    async function submitTask() {
      if (S.saving) return;
      S.saving = true;
      var type = document.getElementById('f-type').value;
      var editId = document.getElementById('edit-id').value;

      if (type === 'event') {
        var ed = {
          id: editId || undefined,
          nama: document.getElementById('f-title').value.trim(),
          mulai: document.getElementById('f-date').value,
          selesai: document.getElementById('f-enddate').value,
          deskripsi: document.getElementById('f-desc').value.trim(),
          penyelenggara: document.getElementById('f-org').value.trim(),
          warna: S.tempColor || '#14b8a6',
          type: 'event',
          status: ''
        };
        if (!ed.nama || !ed.mulai) { toast('Isi nama & tanggal!', true); S.saving = false; return; }
        try {
          await api('saveCalendarItem', ed);
          // Handle repeat
          if (document.getElementById('f-repeat').checked && !editId) repeatCalendarItem_(ed);
          closeModal();
          await api('getCalendarData');
          renderAll();
          toast('✓ Event tersimpan');
        } catch (e) { toast('Gagal simpan event', true); }
        S.saving = false;
        return;
      }

      if (type === 'reminder') {
        var rd = {
          id: editId || undefined,
          nama: document.getElementById('f-title').value.trim(),
          mulai: document.getElementById('f-date').value,
          selesai: document.getElementById('f-enddate').value,
          deskripsi: document.getElementById('f-desc').value.trim(),
          warna: S.tempColor || '#f59e0b',
          type: 'reminder',
          status: ''
        };
        if (!rd.nama || !rd.mulai) { toast('Isi nama & tanggal!', true); S.saving = false; return; }
        try {
          await api('saveCalendarItem', rd);
          // Handle repeat
          if (document.getElementById('f-repeat').checked && !editId) repeatCalendarItem_(rd);
          closeModal();
          await api('getCalendarData');
          renderAll();
          toast('✓ Reminder tersimpan');
        } catch (e) { toast('Gagal simpan reminder', true); }
        S.saving = false;
        return;
      }

      // Task / Campaign
      const isC = type === 'campaign';
      const channel = document.getElementById('f-channel').value;
      const chData = CHANNELS[channel];
      let title = document.getElementById('f-title').value;
      if (isC && chData) {
        if (!title.startsWith(chData.prefix)) {
          const prefixes = Object.values(CHANNELS).map(c => c.prefix);
          prefixes.forEach(p => { if (title.startsWith(p)) title = title.slice(p.length).trim(); });
          title = chData.prefix + ' ' + title;
        }
      }
      const oldTask = editId ? S.tasks.find(x => x.id === editId) : null;
      const task = {
        id: editId || 'T' + Date.now(),
        title: title,
        type: type,
        description: document.getElementById('f-desc').value,
        date: document.getElementById('f-date').value,
        enddate: document.getElementById('f-enddate').value,
        priority: isC ? 'medium' : document.getElementById('f-priority').value,
        tag: isC ? (channel || (oldTask ? oldTask.tag : '')) : document.getElementById('f-tag').value,
        color: isC && chData ? chData.color : (S.tempColor || COLORS[0]),
        done: oldTask ? oldTask.done : false,
        nama: title,
        mulai: document.getElementById('f-date').value,
        selesai: document.getElementById('f-enddate').value,
        deskripsi: document.getElementById('f-desc').value,
        warna: isC && chData ? chData.color : (S.tempColor || COLORS[0]),
        tipe: type
      };
      if (!task.title || !task.date) { S.saving = false; return toast('Isi judul & tanggal!', true); }

      const exIdx = S.tasks.findIndex(x => x.id === task.id);
      if (exIdx > -1) S.tasks[exIdx] = task; else S.tasks.unshift(task);

      const saveBtn = document.querySelector('#task-modal .btn-primary');
      const origText = saveBtn.textContent;
      saveBtn.textContent = 'Menyimpan...';
      saveBtn.disabled = true;

      closeModal(); renderAll();

      try {
        await api('saveTask', task);
        // Handle repeat
        if (document.getElementById('f-repeat').checked && !editId) {
          var repEvery = parseInt(document.getElementById('f-repeat-every').value) || 1;
          var repUnit = document.getElementById('f-repeat-unit').value;
          var repUntil = document.getElementById('f-enddate').value || (new Date().getFullYear() + '-12-31');
          var cur = new Date(task.date);
          var origEnd = task.enddate ? new Date(task.enddate) : null;
          var diffDays = origEnd ? Math.round((origEnd - cur) / 86400000) : 0;
          var endD = new Date(repUntil);
          var count = 0;
          while (cur < endD) {
            if (repUnit === 'day') cur.setDate(cur.getDate() + repEvery);
            else if (repUnit === 'week') cur.setDate(cur.getDate() + repEvery * 7);
            else cur.setMonth(cur.getMonth() + repEvery);
            if (cur > endD) break;
            var ds = cur.getFullYear() + '-' + pad(cur.getMonth() + 1) + '-' + pad(cur.getDate());
            var rep = JSON.parse(JSON.stringify(task));
            rep.id = 'T' + Date.now() + count;
            rep.date = ds;
            if (diffDays > 0) {
              var ed = new Date(cur); ed.setDate(ed.getDate() + diffDays);
              rep.enddate = ed.getFullYear() + '-' + pad(ed.getMonth() + 1) + '-' + pad(ed.getDate());
            }
            S.tasks.unshift(rep);
            await api('saveTask', rep);
            count++;
          }
          if (count) toast('✓ Tersimpan + ' + count + ' ulangan');
        }
        toast('✓ Berhasil disimpan');
        await refreshData(true);
      } catch (err) {
        toast('Gagal menyimpan!', true);
      } finally {
        saveBtn.textContent = origText;
        saveBtn.disabled = false;
        S.saving = false;
      }
    }

    async function repeatCalendarItem_(tmpl) {
      var repEvery = parseInt(document.getElementById('f-repeat-every').value) || 1;
      var repUnit = document.getElementById('f-repeat-unit').value;
      var repUntil = document.getElementById('f-enddate').value || (new Date().getFullYear() + '-12-31');
      var cur = new Date(tmpl.mulai);
      var origEnd = tmpl.selesai ? new Date(tmpl.selesai) : null;
      var diffDays = origEnd ? Math.round((origEnd - cur) / 86400000) : 0;
      var endD = new Date(repUntil);
      var count = 0;
      while (cur < endD) {
        if (repUnit === 'day') cur.setDate(cur.getDate() + repEvery);
        else if (repUnit === 'week') cur.setDate(cur.getDate() + repEvery * 7);
        else cur.setMonth(cur.getMonth() + repEvery);
        if (cur > endD) break;
        var ds = cur.getFullYear() + '-' + pad(cur.getMonth() + 1) + '-' + pad(cur.getDate());
        var rep = JSON.parse(JSON.stringify(tmpl));
        rep.id = undefined;
        rep.mulai = ds;
        if (diffDays > 0) {
          var ed = new Date(cur); ed.setDate(ed.getDate() + diffDays);
          rep.selesai = ed.getFullYear() + '-' + pad(ed.getMonth() + 1) + '-' + pad(ed.getDate());
        }
        await api('saveCalendarItem', rep);
        count++;
      }
      if (count) toast('✓ + ' + count + ' ulangan tersimpan');
    }

    async function toggleDone(id) {
      var t = S.tasks.find(function(x) { return x.id === id; });
      var source = 'task', isEvent = false, isReminder = false;
      if (!t) { t = S.events.find(function(x) { return x.id === id; }); source = 'event'; isEvent = true; }
      if (!t) { t = S.reminders.find(function(x) { return x.id === id; }); source = 'reminder'; isReminder = true; }
      if (!t) return;
      if (source === 'task') {
        t.done = !t.done; renderAll();
        try { await api('saveTask', t); await refreshData(true); } catch (e) { toast('Gagal mengupdate status!', true); }
      } else {
        t.done = !t.done; t.status = t.done ? 'Selesai' : ''; renderAll();
        try {
          var d = { id: t.id, status: t.status, type: source };
          if (isEvent) { d.nama = t.title; d.mulai = t.date; d.selesai = t.enddate; d.warna = t.color; d.deskripsi = t.description; }
          else { d.nama = t.title; d.mulai = t.date; d.selesai = t.enddate; d.warna = t.color; d.deskripsi = t.description; }
          await api('saveCalendarItem', d);
        } catch (e) { toast('Gagal mengupdate status!', true); }
      }
    }

    // deleteTask now defined above with undo support

    function toast(m, e) {
      const el = document.getElementById('toast');
      if (!el) return;
      el.textContent = m;
      el.style.background = e ? '#ef4444' : '#1e293b';
      el.style.transform = 'translateX(-50%) translateY(0)';
      el.style.opacity = '1';
      setTimeout(() => {
        el.style.opacity = '0';
        el.style.transform = 'translateX(-50%) translateY(30px)';
      }, 3000);
    }

    function printMonthView() {
      const y = S.calYear, m = S.calMonth;
      const title = MONTHS_ID[m] + ' ' + y;

      const first = (new Date(y, m, 1).getDay() || 7) - 1;
      const daysIn = new Date(y, m + 1, 0).getDate();
      const cells = [];
      const prevDays = new Date(y, m, 0).getDate();
      for (let i = first - 1; i >= 0; i--) cells.push({ d: prevDays - i, m: m - 1, y: m === 0 ? y - 1 : y, other: true });
      for (let d = 1; d <= daysIn; d++) cells.push({ d, m, y, other: false });
      while (cells.length < 42) { let n = cells.length - daysIn - first + 1; cells.push({ d: n, m: m + 1, y: m === 11 ? y + 1 : y, other: true }); }
      const days = cells.map(c => c.y + '-' + pad(c.m + 1) + '-' + pad(c.d));

      const SHAPES = ['●', '■', '◆', '★'];
      const slots = {}; days.forEach(ds => slots[ds] = []);
      const monthStart = `${y}-${pad(m + 1)}-01`;
      const monthEnd = `${y}-${pad(m + 1)}-${pad(daysIn)}`;
      const visibleCampaigns = S.tasks.filter(t => {
        if (t.type !== 'campaign' || !t.date) return false;
        const s = t.date, e = t.enddate || t.date;
        return s <= monthEnd && e >= monthStart;
      }).sort((a, b) => a.date.localeCompare(b.date));

      visibleCampaigns.forEach(t => {
        const s = t.date, e = t.enddate || t.date;
        let slot = 0, found = false;
        while (!found) {
          let free = true;
          for (let i = 0; i < 42; i++) { if (days[i] >= s && days[i] <= e && slots[days[i]][slot]) { free = false; break; } }
          if (free) found = true; else slot++;
        }
        for (let i = 0; i < 42; i++) { if (days[i] >= s && days[i] <= e) slots[days[i]][slot] = t; }
      });

      // Group campaigns by title + description
      const groupedCampaigns = {};
      visibleCampaigns.forEach(t => {
        const key = (t.title || '').trim().toLowerCase() + '|||' + (t.description || '').trim().toLowerCase();
        if (!groupedCampaigns[key]) {
          groupedCampaigns[key] = { title: t.title || '', color: t.color || '#6366f1', description: t.description || '', dates: [] };
        }
        groupedCampaigns[key].dates.push({ start: t.date, end: t.enddate || t.date });
      });
      const uniqueCampaigns = Object.values(groupedCampaigns).map((g, i) => {
        g.shapeIdx = i;
        g.shape = SHAPES[i % SHAPES.length];
        g.dates.sort((a, b) => a.start.localeCompare(b.start));
        g.dateLabels = g.dates.map(d => {
          const d1 = parseInt(d.start.split('-')[2], 10);
          const d2 = d.end !== d.start ? parseInt(d.end.split('-')[2], 10) : null;
          return d2 ? `${d1} → ${d2}` : `${d1}`;
        });
        return g;
      });
      const shapeMap = {};
      uniqueCampaigns.forEach(g => {
        const key = (g.title || '').trim().toLowerCase() + '|||' + (g.description || '').trim().toLowerCase();
        shapeMap[key] = g.shapeIdx;
      });

      const gridHtml = cells.map((c, idx) => {
        const ds = days[idx];
        const daySlots = (slots[ds] || []).filter(Boolean);
        const maxDots = 4;
        const shown = daySlots.slice(0, maxDots);
        const moreCount = daySlots.length - maxDots;
        const dots = shown.map(t => {
          const key = (t.title || '').trim().toLowerCase() + '|||' + (t.description || '').trim().toLowerCase();
          const si = shapeMap[key] || 0;
          const num = si + 1;
          return `<span class="p-dot" style="background:${t.color || '#6366f1'};color:#fff;" title="${esc(t.title || '')}">${SHAPES[si]}${num}</span>`;
        }).join('');
        const moreHtml = moreCount > 0 ? `<span class="p-more">+${moreCount}</span>` : '';

        const holi = holidaysCache[ds];
        const isHoliCls = holi ? (holi.type === 'leave' ? ' is-leave' : ' is-holiday') : '';
        const holiHtml = holi ? `<div class="p-holiday ${holi.type === 'leave' ? 'p-leave-label' : ''}">${esc(holi.name)}</div>` : '';

        // Find today
        const todayStr = dateStr(new Date());
        const dateHtml = ds === todayStr ? `<span class="p-today-marker">${c.d}</span>` : c.d;

        return `<div class="p-cell ${c.other ? 'other' : ''}${isHoliCls}"><div class="p-cell-head">${dateHtml}${holiHtml}</div><div class="p-dots">${dots}${moreHtml}</div></div>`;
      }).join('');

      const listHtml = uniqueCampaigns.map(g => {
        const datesHtml = g.dateLabels.map(d => `<span style="background:#e0e7ff; padding:1px 5px; border-radius:3px; margin-right:3px; display:inline-block; margin-bottom:2px; font-size:8px; font-weight:700; color:#3730a3;">${d}</span>`).join('');
        const num = g.shapeIdx + 1;
        return `
        <div class="p-item" style="--item-color:${g.color};">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;">
            <span style="background:${g.color};color:#fff;width:22px;height:22px;border-radius:3px;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0;-webkit-print-color-adjust:exact;print-color-adjust:exact;">${g.shape}${num}</span>
            <div style="font-size:11px;font-weight:800;color:#0f172a;line-height:1.2;">${esc(g.title)}</div>
          </div>
          <div style="margin-bottom:2px;">${datesHtml}</div>
          <div style="font-size:9px;color:#475569;line-height:1.25;margin:0;white-space:pre-wrap;">${esc(g.description || '') || '—'}</div>
        </div>
      `}).join('');

      const win = window.open('', '_blank');
      win.document.write(`
        <html>
<head>
          <title>Print - ${title}</title>
          <style>
            body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 15px; color: #1e293b; background: #fff; width: 100%; box-sizing: border-box; }
            .container { display: flex; flex-direction: column; gap: 0; width: 100%; }
            .cal-side { page-break-after: always; padding-bottom: 12px; }
            .list-side { padding-top: 0; }
            .list-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
            
            h1 { font-size: 18px; margin: 0 0 12px; font-weight: 800; }
            .p-grid { 
              display: grid; 
              grid-template-columns: repeat(7, 14.285%); 
              border-top: 1px solid #94a3b8; 
              border-left: 1px solid #94a3b8; 
            }
            .p-cell { 
              border-right: 1px solid #94a3b8; 
              border-bottom: 1px solid #94a3b8; 
              min-height: 90px; 
              padding: 4px; 
              font-size: 11px; 
              font-weight: 800; 
              color: #64748b; 
              /* removed overflow:hidden to allow multi-day ribbons to connect seamlessly */
            }
            .p-cell.other { background: #f8fafc; color: #cbd5e1; filter: grayscale(100%); opacity: 0.55; }
            .p-cell.is-holiday { background-color: #fef2f2 !important; border-color: #ef4444 !important; color: #ef4444 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .p-cell.is-leave { background-color: #fffbeb !important; border-color: #f59e0b !important; color: #d97706 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .p-cell-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2px; }
            .p-today-marker { background: #3b82f6 !important; color: #fff !important; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .p-holiday { font-size: 8px; color: #ef4444; font-weight: 700; text-align: right; margin-left: 4px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .p-holiday.p-leave-label { color: #d97706; }
            .p-day-names { display: grid; grid-template-columns: repeat(7, 14.285%); text-align: center; font-size: 10px; font-weight: 800; opacity: 0.6; margin-bottom: 5px; }

            .p-dots { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 3px; }
            .p-dot { min-width: 22px; height: 18px; border-radius: 3px; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; line-height: 1; padding: 0 2px; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .p-more { font-size: 7px; font-weight: 700; color: #94a3b8; display: inline-flex; align-items: center; }

            .p-item { page-break-inside: avoid; break-inside: avoid; border-left: 4px solid var(--item-color, #6366f1); padding: 6px 10px; background: #f8fafc; border-radius: 6px; }
            @media print {
              body { padding: 0; margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
              @page { size: A4 landscape; margin: 15mm !important; }
              .p-grid { border-width: 1.5px; }
              .p-cell { border-width: 1.5px; min-height: 80px; }
              .p-dot { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
              .cal-side { page-break-after: always; }
            }
          </style>
        </head>
        <body>
          <div class="container">
            <div class="cal-side">
              <h1>${title}</h1>
              <div class="p-day-names">
                <div>SEN</div><div>SEL</div><div>RAB</div><div>KAM</div><div>JUM</div><div>SAB</div><div>MIN</div>
              </div>
              <div class="p-grid">${gridHtml}</div>
            </div>
            <div class="list-side">
              <h2 style="font-size:16px; margin:0 0 14px; font-weight:800;">Daftar Campaign</h2>
              <div class="list-grid">
                ${listHtml || '<p style="opacity:0.5">Tidak ada campaign bulan ini.</p>'}
              </div>
            </div>
          </div>
          <script>window.onload = () => { setTimeout(() => { window.print(); window.close(); }, 100); };<\/script>
</body>

</html>
`);
      win.document.close();
    }

    // ── Event & Reminder ──
    var S_eventFilter = 'all', S_reminderFilter = 'all';

    function setEventFilter(f, el) {
      S_eventFilter = f;
      el.parentNode.querySelectorAll('.tab').forEach(function(x) { x.classList.remove('active'); });
      el.classList.add('active');
      renderEvents();
    }
    function setReminderFilter(f, el) {
      S_reminderFilter = f;
      el.parentNode.querySelectorAll('.tab').forEach(function(x) { x.classList.remove('active'); });
      el.classList.add('active');
      renderReminders();
    }

    function renderEvents() {
      var el = document.getElementById('event-list-el');
      if (!el) return;
      var list = S.events.filter(function(e) {
        if (S_eventFilter === 'upcoming') return e.date && e.date >= todayStr();
        if (S_eventFilter === 'past') return !e.date || e.date < todayStr();
        return true;
      });
      if (!list.length) {
        el.innerHTML = '<div class="empty-state"><div style="font-size:32px;margin-bottom:8px;">📅</div><div>Belum ada event</div></div>';
        return;
      }
      el.innerHTML = list.map(function(e) {
        return '<div class="task-row" onclick="selectTask(\'' + e.id + '\')" style="border-left:3px solid ' + (e.color || '#14b8a6') + '">' +
          '<div class="task-main"><div class="task-name">' + esc(e.title || 'Event') + '</div>' +
          '<div class="task-sub"><span>📅 ' + (e.date || '—') + '</span>' +
          (e.enddate && e.enddate !== e.date ? ' → ' + e.enddate : '') +
          (e.penyelenggara ? '<span style="opacity:0.5"> · ' + esc(e.penyelenggara) + '</span>' : '') +
          '<span class="badge" style="background:rgba(20,184,166,0.1);color:#14b8a6;">📅 Event</span>' +
          '</div></div></div>';
      }).join('');
    }

    function renderReminders() {
      var el = document.getElementById('reminder-list-el');
      if (!el) return;
      var list = S.reminders.filter(function(r) {
        if (S_reminderFilter === 'pending') return !r.status || r.status !== 'Selesai';
        if (S_reminderFilter === 'done') return r.status === 'Selesai';
        return true;
      });
      if (!list.length) {
        el.innerHTML = '<div class="empty-state"><div style="font-size:32px;margin-bottom:8px;">🔔</div><div>Belum ada reminder</div></div>';
        return;
      }
      el.innerHTML = list.map(function(r) {
        var done = r.status === 'Selesai' || r.done;
        return '<div class="task-row ' + (done ? 'done' : '') + '" onclick="selectTask(\'' + r.id + '\')" style="border-left:3px solid ' + (r.color || '#f59e0b') + '">' +
          '<div class="task-check ' + (done ? 'checked' : '') + '" onclick="event.stopPropagation();toggleDone(\'' + r.id + '\')"></div>' +
          '<div class="task-main"><div class="task-name">' + esc(r.title || 'Reminder') + '</div>' +
          '<div class="task-sub"><span>📅 ' + (r.date || '—') + '</span>' +
          (r.enddate && r.enddate !== r.date ? ' → ' + r.enddate : '') +
          '<span class="badge" style="background:' + (done ? '#ecfdf5' : '#f1f5f9') + ';color:' + (done ? '#10b981' : '#94a3b8') + ';">' + (done ? '✓ Selesai' : '⏳ Pending') + '</span>' +
          '</div></div></div>';
      }).join('');
    }

    function todayStr() {
      var d = new Date();
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    // Modal Event
  </script>
    <script>
        function toggleTheme() {
            var html = document.documentElement;
            var current = html.getAttribute('data-theme') || 'light';
            var next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
        }
        window.addEventListener('message', function(e) {
            if (e.data && e.data.type === 'SET_THEME') {
                document.documentElement.setAttribute('data-theme', e.data.theme);
            }
        });
    </script>
</body>

</html>
