<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resi Generator — Supersub</title>
<link rel="stylesheet" href="../../src/styles/tools.css">
<style>
  :root {
    --bg        : #F0F1F4;
    --surface   : #F8F9FB;
    --border    : #D5D9E2;
    --text      : #1E293B;
    --muted     : #5B6478;
    --accent    : #0F4C75;
    --accent-lt : #E8F1F8;
    --success   : #16A34A;
    --success-lt: #F0FDF4;
    --danger    : #DC2626;
    --lock      : #94A3B8;
    --lock-bg   : #ECEEF3;
    --radius    : 14px;
    --shadow    : 0 1px 3px rgba(0,0,0,.07), 0 4px 14px rgba(0,0,0,.05);
    --neo-light : #FFFFFF;
    --neo-dark  : #C8CDD6;
    --neo-deep  : #B8BFC9;
    --neo-out   : 8px 8px 16px var(--neo-dark), -8px -8px 16px var(--neo-light);
    --neo-out-sm: 5px 5px 10px var(--neo-dark), -5px -5px 10px var(--neo-light);
    --neo-in    : inset 5px 5px 10px var(--neo-dark), inset -5px -5px 10px var(--neo-light);
  }
  [data-theme="dark"] {
    --bg: #0F1117; --surface: #1A1D27; --border: #2A2D3A; --text: #E2E8F0; --muted: #94A3B8;
    --accent: #60A5FA; --accent-lt: #1E293B; --success: #4ADE80; --success-lt: #14332A;
    --danger: #F87171; --lock: #64748B; --lock-bg: #1E293B;
    --neo-light: #2A2D3A; --neo-dark: #0A0C12;
    --neo-out: 8px 8px 16px var(--neo-dark), -8px -8px 16px var(--neo-light);
    --neo-out-sm: 5px 5px 10px var(--neo-dark), -5px -5px 10px var(--neo-light);
    --neo-in: inset 5px 5px 10px var(--neo-dark), inset -5px -5px 10px var(--neo-light);
  }
  [data-theme="dark"] .topbar { background: var(--surface); border-color: var(--border); }
  [data-theme="dark"] .topbar-ver { background: var(--bg); border-color: var(--border); color: var(--muted); }
  [data-theme="dark"] input, [data-theme="dark"] select, [data-theme="dark"] textarea {
    background: var(--surface); border-color: var(--border); color: var(--text);
  }
  [data-theme="dark"] .card, [data-theme="dark"] .sec { background: var(--surface); border-color: var(--border); }
  [data-theme="dark"] .sec.alt { background: var(--bg); }
  [data-theme="dark"] .pill { background: var(--bg); border-color: var(--border); color: var(--text); }
  [data-theme="dark"] .pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  [data-theme="dark"] .eksp-btn { background: var(--bg); border-color: var(--border); color: var(--text); }
  [data-theme="dark"] .eksp-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  [data-theme="dark"] .prod-row { background: var(--surface); border-color: var(--border); }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  /* ══════════════════════════════════════════════════
     TOP BAR
     ══════════════════════════════════════════════════ */
  .topbar {
    background:var(--surface); border-bottom:1px solid var(--border);
    padding:0 24px; height:58px;
    display:flex; align-items:center; gap:12px;
    position:sticky; top:0; z-index:100;
    box-shadow:0 1px 4px rgba(0,0,0,.06);
  }
  .topbar-icon  { width:34px;height:34px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0; }
  .topbar-icon svg { width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round; }
  .topbar-title { font-size:16px;font-weight:800;color:var(--text);white-space:nowrap; }
  .topbar-ver   { margin-left:auto;font-size:11px;color:var(--muted);background:var(--bg);border:1px solid var(--border);padding:3px 9px;border-radius:100px;white-space:nowrap;flex-shrink:0; }

  /* ══════════════════════════════════════════════════
     LAYOUT
     ══════════════════════════════════════════════════ */
  .main { max-width:960px; margin:0 auto; padding:24px 18px; display:grid; grid-template-columns:1fr 1fr; gap:18px; }
  @media (max-width:680px){ .main{ grid-template-columns:1fr; gap:14px; padding:16px 12px; } }
  .full-col { grid-column:1/-1; }

  /* ══════════════════════════════════════════════════
     CARD
     ══════════════════════════════════════════════════ */
  .card {
    background:var(--surface); border:1.5px solid var(--border);
    border-radius:var(--radius); padding:18px 20px;
    box-shadow:var(--neo-out);
    transition:box-shadow .25s ease, transform .25s ease;
  }
  .card:hover { box-shadow:10px 10px 20px var(--neo-deep), -10px -10px 20px var(--neo-light); transform:translateY(-1px); }
  @media (max-width:480px){ .card{ padding:14px 14px; } }
  .card-title { font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:7px; }
  .card-title .ico { display:inline-flex; align-items:center; justify-content:center; width:24px; height:24px; background:var(--accent-lt); border-radius:6px; flex-shrink:0; }
  .card-title .ico svg { width:14px; height:14px; stroke:var(--accent); stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; }

  /* ══════════════════════════════════════════════════
     FORM ELEMENTS
     ══════════════════════════════════════════════════ */
  .field { margin-bottom:13px; }
  .field:last-child { margin-bottom:0; }
  label { display:block;font-size:11.5px;font-weight:600;color:var(--muted);margin-bottom:4px;letter-spacing:.2px; }
  input,select,textarea {
    width:100%; padding:11px 12px;
    border:1.5px solid var(--border); border-radius:8px;
    font-family:inherit; font-size:16px; color:var(--text);
    background:var(--surface);
    transition:all .2s cubic-bezier(.4,0,.2,1);
    outline:none;
  }
  /* iOS zoom fix: 16px prevents auto-zoom on focus */
  @media (max-width:480px){ input,select,textarea{ font-size:16px; } }
  input:focus,select:focus,textarea:focus { border-color:var(--accent); box-shadow:var(--neo-in),0 0 0 3px rgba(15,76,117,.12); }
  textarea { resize:vertical; min-height:68px; line-height:1.5; }

  /* ══════════════════════════════════════════════════
     LOCKED FIELDS
     ══════════════════════════════════════════════════ */
  .locked-field {
    width:100%; padding:11px 12px;
    border:1.5px solid var(--border); border-radius:8px;
    font-family:inherit; font-size:13.5px;
    color:var(--lock); background:var(--lock-bg);
    cursor:not-allowed; user-select:none;
    display:flex; align-items:center; gap:8px;
    line-height:1.4;
  }
  .locked-field.ta { align-items:flex-start; min-height:68px; white-space:pre-wrap; word-break:break-word; }
  .lock-icon { font-size:12px; opacity:.6; flex-shrink:0; display:inline-flex; align-items:center; }
  .lock-icon svg { width:12px; height:12px; stroke:var(--lock); stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; }
  .locked-badge {
    display:inline-flex; align-items:center; gap:5px;
    padding:4px 10px; border-radius:7px;
    background:#F1F5F9; border:1px solid var(--border);
    font-size:10.5px;font-weight:600; color:var(--lock);
    margin-bottom:12px;
  }

  /* ══════════════════════════════════════════════════
     MODE TOGGLE
     ══════════════════════════════════════════════════ */
  .mode-toggle {
    display:grid; grid-template-columns:1fr 1fr;
    gap:0; border:1.5px solid var(--border); border-radius:10px;
    overflow:hidden; margin-bottom:16px;
    box-shadow:var(--neo-out-sm);
  }
  .mode-btn {
    padding:11px 12px; text-align:center;
    font-size:12px; font-weight:600; cursor:pointer;
    background:var(--surface); color:var(--muted);
    border:none; font-family:inherit;
    transition:all .2s cubic-bezier(.4,0,.2,1); user-select:none;
  }
  .mode-btn:first-child { border-right:1.5px solid var(--border); }
  .mode-btn.active { background:var(--accent); color:#fff; }
  .mode-btn .mode-sub { font-size:9.5px; font-weight:400; opacity:.8; display:block; margin-top:1px; }

  /* ══════════════════════════════════════════════════
     EKSPEDISI
     ══════════════════════════════════════════════════ */
  .eksp-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:6px; }
  @media (max-width:480px){ .eksp-grid{ grid-template-columns:repeat(3,1fr); gap:6px; } }
  .eksp-btn {
    cursor:pointer; border:1.5px solid var(--border); border-radius:10px;
    padding:7px 3px 5px; text-align:center;
    transition:all .2s cubic-bezier(.4,0,.2,1); background:var(--surface); user-select:none;
    box-shadow:var(--neo-out-sm);
  }
  @media (hover:hover){ .eksp-btn:hover{ transform:translateY(-2px); box-shadow:7px 7px 14px var(--neo-deep), -7px -7px 14px var(--neo-light); } }
  .eksp-btn:active { transform:translateY(0); box-shadow:var(--neo-in); }
  .eksp-btn.active { border-color:var(--accent); box-shadow:var(--neo-in); }
  .eksp-logo { width:32px;height:32px;object-fit:contain;margin:0 auto 4px;filter:grayscale(80%) brightness(.45) contrast(1.1);transition:filter .2s cubic-bezier(.4,0,.2,1); }
  .eksp-btn.active .eksp-logo,.eksp-btn:hover .eksp-logo { filter:grayscale(40%) brightness(.35) contrast(1.15); }
  .eksp-label { font-size:8.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px; }

  /* ══════════════════════════════════════════════════
     LAYANAN PILLS
     ══════════════════════════════════════════════════ */
  .pill-group { display:flex; flex-wrap:wrap; gap:7px; }
  .pill {
    cursor:pointer; padding:8px 16px; min-height:44px;
    border:1.5px solid var(--border); border-radius:100px;
    font-size:13px;font-weight:600; color:var(--muted);
    background:var(--surface); transition:all .2s cubic-bezier(.4,0,.2,1); user-select:none;
    display:inline-flex; align-items:center;
    box-shadow:var(--neo-out-sm);
  }
  @media (hover:hover){ .pill:hover{ transform:translateY(-2px); border-color:var(--accent); color:var(--accent); box-shadow:7px 7px 14px var(--neo-deep), -7px -7px 14px var(--neo-light); } }
  .pill:active { transform:translateY(0); box-shadow:var(--neo-in); border-color:var(--accent); color:var(--accent); }
  .pill.active { border-color:var(--accent); background:var(--accent); color:#fff; }

  /* ══════════════════════════════════════════════════
     PRODUK
     ══════════════════════════════════════════════════ */
  .prod-header { display:grid; grid-template-columns:1fr 120px 60px 36px; gap:5px; margin-bottom:6px; display:none; }
  .prod-header div { font-size:10.5px;font-weight:600;color:var(--muted);padding:0 4px; }
  .product-list { display:flex;flex-direction:column;gap:8px; }
  .product-row  { display:grid; grid-template-columns:1fr 120px 60px 36px; gap:5px; align-items:center; }
  .product-row input { font-size:13px; padding:9px 10px; }

  /* AUTOCOMPLETE WRAPPER */
  .product-search-wrapper { position:relative; width:100%; }
  .product-suggestions {
    position:absolute; top:100%; left:0; right:0; z-index:50;
    background:#fff; border:1.5px solid var(--border); border-radius:0 0 8px 8px;
    box-shadow:0 4px 12px rgba(0,0,0,.1);
    max-height:220px; overflow-y:auto; display:none;
  }
  .product-suggestions.show { display:block; }
  .suggestion-item {
    padding:10px 10px; font-size:13px; cursor:pointer; min-height:44px;
    border-bottom:1px solid var(--border);
    transition:all .1s;
    display:flex; align-items:center; justify-content:space-between;
  }
  .suggestion-item:last-child { border-bottom:none; }
  .suggestion-item:active { background:var(--accent-lt); color:var(--accent); font-weight:600; }
  .suggestion-item.active { background:var(--accent-lt); color:var(--accent); font-weight:600; }
  @media (hover:hover){ .suggestion-item:hover{ background:var(--accent-lt); color:var(--accent); font-weight:600; } }
  .suggestion-item .s-sku { font-size:10px; font-weight:400; color:var(--muted); margin-left:6px; }
  .suggestion-item .s-cat {
    font-size:9px; font-weight:600; color:var(--accent);
    background:var(--accent-lt); padding:2px 6px; border-radius:4px; flex-shrink:0;
  }
  .product-name-manual {
    font-size:11px; color:var(--muted); text-align:center; padding:10px;
    border-top:1px dashed var(--border); font-weight:600;
  }

  @media (max-width:480px){
    .prod-header{ display:none; }
    .product-row { grid-template-columns:1fr 90px 50px 36px; gap:4px; }
    .product-row input { font-size:14px; padding:11px 8px; }
    .suggestion-item { padding:12px 8px; font-size:14px; }
  }

  /* ══════════════════════════════════════════════════
     BUTTONS
     ══════════════════════════════════════════════════ */
  .btn-del {
    width:36px;height:36px; min-width:36px; min-height:36px;
    border:1.5px solid var(--border); background:var(--surface);
    border-radius:7px; cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    font-size:14px;color:var(--danger); transition:all .15s;
  }
  .btn-del:active { background:#FEF2F2;border-color:var(--danger); }
  @media (hover:hover){ .btn-del:hover{ background:#FEF2F2;border-color:var(--danger); } }
  .btn-add {
    display:inline-flex;align-items:center;justify-content:center;gap:6px; min-height:44px;
    padding:7px 16px; background:var(--surface);
    border:1.5px dashed var(--accent); border-radius:10px;
    color:var(--accent);font-size:13px;font-weight:600;
    cursor:pointer;margin-top:8px; transition:all .2s cubic-bezier(.4,0,.2,1); font-family:inherit;width:100%;
    box-shadow:var(--neo-out-sm);
  }
  .btn-add:active { box-shadow:var(--neo-in);transform:translateY(0); }
  @media (hover:hover){ .btn-add:hover{ transform:translateY(-2px);box-shadow:7px 7px 14px var(--neo-deep),-7px -7px 14px var(--neo-light);background:var(--accent);color:#fff;border-style:solid; } }

  /* ══════════════════════════════════════════════════
     ACTION BAR
     ══════════════════════════════════════════════════ */
  .action-bar { display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap; }
  .btn {
    display:inline-flex;align-items:center;justify-content:center;gap:6px; min-height:44px;
    padding:10px 18px; border-radius:9px;
    font-family:inherit;font-size:13.5px;font-weight:600;
    cursor:pointer;border:none; transition:all .15s; white-space:nowrap;flex:1;
  }
  .btn-secondary { background:var(--surface);border:1.5px solid var(--border);color:var(--text);box-shadow:var(--neo-out-sm);transition:all .2s cubic-bezier(.4,0,.2,1); }
  .btn-secondary:active { box-shadow:var(--neo-in);transform:translateY(0); }
  @media (hover:hover){ .btn-secondary:hover{ transform:translateY(-2px);box-shadow:7px 7px 14px var(--neo-deep),-7px -7px 14px var(--neo-light);border-color:var(--accent);color:var(--accent); } }
  .btn-primary { background:var(--accent);color:#fff;box-shadow:0 4px 14px rgba(15,76,117,.3);transition:all .2s cubic-bezier(.4,0,.2,1); }
  .btn-primary:active { background:#0a3a5c;transform:translateY(0);box-shadow:0 2px 6px rgba(15,76,117,.3); }
  @media (hover:hover){ .btn-primary:hover{ background:#0a3a5c;transform:translateY(-2px);box-shadow:0 6px 18px rgba(15,76,117,.35); } }
  .btn:disabled { opacity:.5;cursor:not-allowed;pointer-events:none; }

  @media (max-width:680px){
    .action-bar .btn { flex:1 1 auto; font-size:12.5px; padding:10px 12px; }
  }

  .req { color:var(--danger); margin-left:2px; }

  /* ══════════════════════════════════════════════════
     TOAST
     ══════════════════════════════════════════════════ */
  .toast {
    position:fixed;bottom:22px;right:22px;left:22px;
    padding:12px 16px; border-radius:9px;
    font-size:13.5px;font-weight:600;
    box-shadow:0 4px 18px rgba(0,0,0,.13);
    z-index:999;display:flex;align-items:center;gap:8px;
    transform:translateY(80px);opacity:0;
    transition:all .28s cubic-bezier(.34,1.56,.64,1);
    pointer-events:none;max-width:400px;margin:0 auto;
  }
  .toast.show    { transform:translateY(0);opacity:1; }
  .toast.success { background:var(--success-lt);color:var(--success);border:1.5px solid #BBF7D0; }
  .toast.error   { background:#FEF2F2;color:var(--danger);border:1.5px solid #FECACA; }
  .toast.info    { background:var(--accent-lt);color:var(--accent);border:1.5px solid #BFDBFE; }

  /* ══════════════════════════════════════════════════
     RESULT
     ══════════════════════════════════════════════════ */
  .result-card {
    padding:13px 15px; border-radius:10px;
    display:flex;align-items:center;gap:11px;
    border:1.5px solid var(--border); margin-top:12px;
    flex-wrap:wrap;
  }
  .result-card.success { background:var(--success-lt);border-color:#BBF7D0; }
  .r-title   { font-size:13.5px;font-weight:700;color:var(--success); }
  .r-sub     { font-size:11px;color:var(--muted);margin-top:2px; }
  .r-actions { margin-left:auto;display:flex;gap:7px;flex-wrap:wrap; }
  .btn-sm {
    padding:8px 14px; min-height:44px;font-size:13px;font-weight:600;
    border-radius:7px;border:1.5px solid var(--border);
    background:var(--surface);color:var(--text);
    cursor:pointer;font-family:inherit;transition:all .15s;
    text-decoration:none;display:inline-flex;align-items:center;gap:5px;
  }
  @media (hover:hover){ .btn-sm:hover{ background:var(--bg); } }
  .btn-sm:active{ background:var(--bg); }
  .btn-sm.grn    { background:#16a34a;color:#fff;border-color:#16a34a; }
  .btn-sm.grn:active { background:#15803d; }

  /* ══════════════════════════════════════════════════
     SPINNER
     ══════════════════════════════════════════════════ */
  .spin { display:inline-block;width:14px;height:14px;border:2.5px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite; }
  @keyframes sp { to{ transform:rotate(360deg) } }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></div>
  <div class="topbar-title">Resi Generator</div>
  <div class="topbar-ver">Supersub v4 · 100×150mm</div>
  <button class="theme-toggle" onclick="toggleTheme()" title="Ubah Tema">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>
</div>

<div class="main">

  <!-- ══════════════════════════════════
       EKSPEDISI & LAYANAN
  ══════════════════════════════════ -->
  <div class="card full-col">
    <div class="card-title"><span class="ico"><svg viewBox="0 0 24 24"><path d="M1 3h15v13H1z"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg></span> Ekspedisi</div>
    <div class="eksp-grid">
      <div class="eksp-btn active" data-val="JNE" onclick="pickEksp(this)">
        <img class="eksp-logo" src="Logo/exp_jne.png" alt="JNE">
        <div class="eksp-label">JNE</div>
      </div>
      <div class="eksp-btn" data-val="POS" onclick="pickEksp(this)">
        <img class="eksp-logo" src="Logo/exp_pos.png" alt="POS">
        <div class="eksp-label">POS</div>
      </div>
      <div class="eksp-btn" data-val="JNT" onclick="pickEksp(this)">
        <img class="eksp-logo" src="Logo/exp_jnt.png" alt="J&T">
        <div class="eksp-label">J&T</div>
      </div>
      <div class="eksp-btn" data-val="JNT CARGO" onclick="pickEksp(this)">
        <img class="eksp-logo" src="Logo/exp_jntcargo.png" alt="JNT Cargo">
        <div class="eksp-label">JNT Cargo</div>
      </div>
      <div class="eksp-btn" data-val="BARAKA EXPRESS" onclick="pickEksp(this)">
        <img class="eksp-logo" src="Logo/exp_baraka.png" alt="Baraka">
        <div class="eksp-label">Baraka</div>
      </div>
      <div class="eksp-btn" data-val="OJOL" onclick="pickEksp(this)">

// ── Init ────────────────────────────────────────────────────────
window.onload = function() {
  document.getElementById('dispNama').textContent   = DEFAULT_SENDER.nama;
  document.getElementById('dispHp').textContent     = DEFAULT_SENDER.hp;
  document.getElementById('dispAlamat').textContent = DEFAULT_SENDER.alamat;
  addProduct();
  loadProductDatabase();
  restoreFormState();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') {
      var btn = document.getElementById('btnPreview');
      if (btn && !btn.disabled) doPreview();
    }
  });
};

// ── Product Database ──────────────────────────────────────────
// Coba load products.json (jalan kalau di server/hosting).
// Kalau gagal (file:// / double-click), pakai EMBEDDED_PRODUCTS agar autocomplete tetap jalan.
function loadProductDatabase() {
  productDatabase = EMBEDDED_PRODUCTS.slice();
  fetch('products.json')
    .then(function(r) {
      if (!r.ok) throw new Error('http ' + r.status);
      return r.json();
    })
    .then(function(data) {
      if (data && data.length) productDatabase = data;
    })
    .catch(function() {
      /* silent: sudah pakai embedded fallback */
    });
}

function setMode(mode) {

  document.getElementById('modeDefault').classList.toggle('active', isDef);
  document.getElementById('modeReseller').classList.toggle('active', !isDef);

// ── Produk ───────────────────────────────────────────────────────
function addProduct() {
  productCount++;
  var id  = 'p' + productCount;
  var div = document.createElement('div');
  div.className = 'product-row';
  div.id = id;
  div.innerHTML =
    '<div class="product-search-wrapper">' +
      '<input type="text" class="pn" placeholder="Cari nama produk..." autocomplete="off">' +
      '<div class="product-suggestions" id="sug-' + id + '"></div>' +
    '</div>' +
    '<input type="text" class="ps" placeholder="SKU / varian">' +
    '<input type="number" class="pq" placeholder="1" min="1" value="1" inputmode="numeric">' +
    '<button class="btn-del" onclick="delProduct(\'' + id + '\')">✕</button>';
  document.getElementById('productList').appendChild(div);
  initAutocomplete(div);
}
function delProduct(id) {
  var list = document.getElementById('productList');
  if (list.children.length > 1) document.getElementById(id).remove();
  else showToast('Minimal 1 produk.', 'info');
}

// ── Autocomplete ──────────────────────────────────────────────────
function initAutocomplete(row) {
  var input = row.querySelector('.pn');
  var sug   = row.querySelector('.product-suggestions');
  var sku   = row.querySelector('.ps');

  var debounceTimer;
  input.addEventListener('input', function() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(function() {
      var q = input.value.trim();
      if (q.length < 2) { hideSuggestions(sug); return; }
      var ql = q.toLowerCase();
      var matches = productDatabase.filter(function(p) {
        return p.name.toLowerCase().indexOf(ql) !== -1 ||
               p.sku.toLowerCase().indexOf(ql) !== -1;
      });
      showSuggestions(sug, input, matches, sku);
    }, 150);
  });

  input.addEventListener('focus', function() {
    if (this.value.trim().length >= 2) {
      var q = this.value.trim().toLowerCase();
      var matches = productDatabase.filter(function(p) {
        return p.name.toLowerCase().indexOf(q) !== -1 ||
               p.sku.toLowerCase().indexOf(q) !== -1;
      });
      showSuggestions(sug, input, matches, sku);
    }
  });

  input.addEventListener('blur', function() {
    setTimeout(function() { hideSuggestions(sug); }, 200);
  });

  input.addEventListener('keydown', function(e) {
    var items = sug.querySelectorAll('.suggestion-item');
    if (!items.length) return;
    var active = sug.querySelector('.active');
    var idx = Array.from(items).indexOf(active);

    if (e.key === 'ArrowDown') {
      e.preventDefault();
      var next = (active ? idx + 1 : 0);
      if (next < items.length) {
        if (active) active.classList.remove('active');
        items[next].classList.add('active');
      }
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      var prev = active ? idx - 1 : -1;
      if (prev >= 0) {
        active.classList.remove('active');
        items[prev].classList.add('active');
      }
    } else if (e.key === 'Enter') {
      e.preventDefault();
      e.stopPropagation();
      if (active) active.click();
    }
  });
}

function showSuggestions(container, input, matches, skuInput) {
  container.innerHTML = '';
  if (!matches || !matches.length) {
    var msg = !productDatabase.length ? 'Memuat database...' : 'Ketik manual';
    container.innerHTML = '<div class="product-name-manual">' + msg + '</div>';
    container.classList.add('show');
    return;
  }
  matches.slice(0, 8).forEach(function(p, i) {
    var item = document.createElement('div');
    item.className = 'suggestion-item' + (i === 0 ? ' active' : '');
    item.innerHTML =
      '<span>' + p.name + '<span class="s-sku">(' + p.sku + ')</span></span>';
    item.addEventListener('mousedown', function(e) {
      e.preventDefault();
      selectProduct(item, input, skuInput, p);
      hideSuggestions(container);
    });
    container.appendChild(item);
  });
  container.classList.add('show');
}

function selectProduct(item, input, skuInput, product) {
  input.value = product.name;
  skuInput.value = product.sku;
  setTimeout(function() { skuInput.focus(); }, 50);
}

function hideSuggestions(container) {
  container.classList.remove('show');
  container.innerHTML = '';
}

    resellerHp   : document.getElementById('resellerHp').value,
    resellerAlamat: document.getElementById('resellerAlamat').value,
    penerimaNama : document.getElementById('namaPenerima').value,
    penerimaHp   : document.getElementById('noHpPenerima').value,
    penerimaAlamat: document.getElementById('alamatPenerima').value,
    berat        : document.getElementById('berat').value,
    catatan      : document.getElementById('catatan').value,
    produk       : []
  };
  document.querySelectorAll('.product-row').forEach(function(r) {
    state.produk.push({
      nama: r.querySelector('.pn').value,
      sku : r.querySelector('.ps').value,
      qty : r.querySelector('.pq').value
    });
  });
  try { localStorage.setItem('resiFormState', JSON.stringify(state)); } catch(e) {}
}

function restoreFormState() {
  var raw;
  try { raw = localStorage.getItem('resiFormState'); } catch(e) {}
  if (!raw) return;
  var state;
  try { state = JSON.parse(raw); } catch(e) {}
  if (!state) return;

  // restore mode
  if (state.mode === 'reseller') setMode('reseller');

  // restore field values
  if (state.resellerNama)   document.getElementById('resellerNama').value   = state.resellerNama;
  if (state.resellerHp)     document.getElementById('resellerHp').value     = state.resellerHp;
  if (state.resellerAlamat) document.getElementById('resellerAlamat').value = state.resellerAlamat;
  if (state.penerimaNama)   document.getElementById('namaPenerima').value   = state.penerimaNama;
  if (state.penerimaHp)     document.getElementById('noHpPenerima').value   = state.penerimaHp;
  if (state.penerimaAlamat) document.getElementById('alamatPenerima').value = state.penerimaAlamat;
  if (state.berat)          document.getElementById('berat').value          = state.berat;
  if (state.catatan)        document.getElementById('catatan').value        = state.catatan;

  // restore ekspedisi
  if (state.ekspedisi) {
    var ekspBtn = document.querySelector('.eksp-btn[data-val="' + state.ekspedisi + '"]');
    if (ekspBtn) pickEksp(ekspBtn);
  }

  // restore layanan
  if (state.layanan) {
    var layBtn = document.querySelector('.pill[data-val="' + state.layanan + '"]');
    if (layBtn) pickLayanan(layBtn);
  }

  // restore produk rows
  if (state.produk && state.produk.length) {
    document.getElementById('productList').innerHTML = '';
    productCount = 0;
    state.produk.forEach(function(p) {
      addProduct();
      var rows = document.querySelectorAll('.product-row');
      var last = rows[rows.length - 1];
      if (p.nama) last.querySelector('.pn').value = p.nama;
      if (p.sku)  last.querySelector('.ps').value = p.sku;
      if (p.qty)  last.querySelector('.pq').value = p.qty;
    });
  }
}

function clearSavedState() {
  try { localStorage.removeItem('resiFormState'); } catch(e) {}
}

function quickFill() {
  restoreFormState();
  showToast('Data sesi terakhir diisi ulang.', 'info');
}

// ── Collect Data ─────────────────────────────────────────────────
function collectData() {
  var produk = [];
  document.querySelectorAll('.product-row').forEach(function(r) {
    var n = r.querySelector('.pn').value.trim();
    if (n) produk.push({
      nama: n,
      sku : r.querySelector('.ps').value.trim(),
      qty : parseInt(r.querySelector('.pq').value) || 1
    });
  });

  var namaPengirim, noHpPengirim, alamatPengirim;
  if (senderMode === 'default') {
    namaPengirim   = DEFAULT_SENDER.nama;
    noHpPengirim   = DEFAULT_SENDER.hp;
    alamatPengirim = DEFAULT_SENDER.alamat;
  } else {
    namaPengirim   = document.getElementById('resellerNama').value.trim();
    noHpPengirim   = document.getElementById('resellerHp').value.trim();
    alamatPengirim = document.getElementById('resellerAlamat').value.trim();
  }

  return {
    ekspedisi     : selectedEksp,
    layanan       : selectedLayanan,
    namaPengirim  : namaPengirim,
    noHpPengirim  : noHpPengirim,
    alamatPengirim: alamatPengirim,
    namaPenerima  : document.getElementById('namaPenerima').value.trim(),
    noHpPenerima  : document.getElementById('noHpPenerima').value.trim(),
    alamatPenerima: document.getElementById('alamatPenerima').value.trim(),
    berat         : document.getElementById('berat').value.trim(),
    catatan       : document.getElementById('catatan').value.trim(),
    produk        : produk
  };
}

// ── Validasi ─────────────────────────────────────────────────────
function validate(d) {
  if (senderMode === 'reseller') {
    if (!d.namaPengirim)   { showToast('Nama pengirim wajib diisi.', 'error');   return false; }
    if (!d.alamatPengirim) { showToast('Alamat pengirim wajib diisi.', 'error'); return false; }
  }
  if (!d.namaPenerima)   { showToast('Nama penerima wajib diisi.', 'error');   return false; }
  if (!d.alamatPenerima) { showToast('Alamat penerima wajib diisi.', 'error'); return false; }
  if (!d.produk.length)  { showToast('Tambahkan minimal 1 produk.', 'error');  return false; }
  return true;
}

// ── Build Resi HTML (Client-side) ───────────────────────────────────
function buildResiHTML(d) {
  if (!d) d = { produk: [] };

  var months = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  var now = new Date();
  var tgl = now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();

  var logoSection = COMPANY_LOGO_BASE64
    ? '<img src="' + COMPANY_LOGO_BASE64 + '" style="max-height:35px;max-width:140px;object-fit:contain;" alt="Logo">'
    : '<div style="font-size:16px;font-weight:900;color:#000;letter-spacing:1px">SUPERSUB</div>';

  // Logo ekspedisi (kanan). Ambil dari EXPEDISI_LOGOS, fallback ke teks.
  var expName = (typeof EMBEDDED_EXPEDISI !== 'undefined' && EMBEDDED_EXPEDISI[d.ekspedisi])
    ? EMBEDDED_EXPEDISI[d.ekspedisi]
    : (d.ekspedisi || '-');
  var expLogo = (typeof EXPEDISI_LOGOS !== 'undefined' && EXPEDISI_LOGOS[d.ekspedisi])
    ? '<img src="' + EXPEDISI_LOGOS[d.ekspedisi] + '" class="exp-logo" alt="' + expName + '">'
    : '<div style="font-size:15px;font-weight:900">' + expName + '</div>';

  var produkRows = '';
  if (d.produk && d.produk.length > 0) {
    d.produk.forEach(function(p) {
      produkRows +=
        '<tr>' +
          '<td style="padding:6px 8px;font-size:11px;border-bottom:1px solid #000">' + (p.nama||'-') + '</td>' +
          '<td style="padding:6px 8px;font-size:10px;text-align:center;border-bottom:1px solid #000">' + (p.sku||'-') + '</td>' +
          '<td style="padding:6px 8px;font-size:11px;font-weight:700;text-align:center;border-bottom:1px solid #000">' + (p.qty||1) + '</td>' +
        '</tr>';
    });
  } else {
    produkRows = '<tr><td colspan="3" style="text-align:center;color:#aaa;padding:6px;border-bottom:1px solid #000">-</td></tr>';
  }

  var catatanSection = d.catatan
    ? '<div class="sec">' +
        '<div class="lbl">Catatan</div>' +
        '<div style="border:1px dashed #000;border-radius:4px;padding:5px 8px;font-size:10px;line-height:1.4">' + d.catatan + '</div>' +
      '</div>'
    : '';

  return '<!DOCTYPE html>' +
  '<html><head><meta charset="UTF-8">' +
  '<style>' +
    '* { margin:0; padding:0; box-sizing:border-box; }' +
    'body { font-family: Arial, sans-serif; background: #fff; width: 100mm; min-height: 150mm; color:#000; }' +
    '.wrap { width: 100mm; min-height: 150mm; display: block; }' +
    '.hdr { background: #fff; border-bottom: 2px solid #000; display:grid; grid-template-columns:1fr auto 1fr; align-items:center; padding:10px 12px; gap:10px; }' +
    '.hdr-left { justify-self:start; }' +
    '.hdr-center { justify-self:center; text-align:center; }' +
    '.hdr-right { justify-self:end; }' +
    '.layanan-txt { font-size:14px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; color:#000; }' +
    '.exp-logo { max-height:35px; max-width:110px; object-fit:contain; display:block; }' +
    '.sec { padding:8px 12px; border:1px solid #000; border-radius:5px; margin:5px 8px; background:#fff; break-inside:avoid; }' +
    '.sec.flow { break-inside:auto; }' +
    '.sec.alt { background:#f9f9f9; }' +
    '.lbl { font-size:8px; font-weight:bold; text-transform:uppercase; color:#000; margin-bottom:2px; }' +
    '.vb  { font-size:13px; font-weight:700; color:#000; line-height:1.2; }' +
    '.vn  { font-size:11px; color:#000; line-height:1.4; }' +
    '.row2 { display:flex; margin:5px 8px; border:1px solid #000; border-radius:5px; overflow:hidden; break-inside:avoid; }' +
    '.c1 { flex:1; padding:7px 12px; border-right:1px solid #000; }' +
    '.c2 { flex:1; padding:7px 12px; }' +
    'table { width:100%; border-collapse:collapse; margin-top:5px; }' +
    'th { border-top:1px solid #000; border-bottom:1px solid #000; background:#eee; font-size:9px; font-weight:700; padding:6px 8px; text-align:left; }' +
    'tbody tr { break-inside:avoid; }' +
    '.ftr-print { position:fixed; left:0; right:0; bottom:0; text-align:center; font-size:9px; font-weight:700; color:#000; border-top:2px solid #000; padding:5px 0; background:#fff; }' +
    '@page { size: 100mm 150mm; margin: 0; }' +
    '@media print { .print-hint { display:none !important; } .sec, .row2, tbody tr { break-inside:avoid; } }' +
  '</style>' +
  '</head><body>' +

  '<div class="wrap">' +
    '<div class="hdr">' +
      '<div class="hdr-left">' + logoSection + '</div>' +
      '<div class="hdr-center"><span class="layanan-txt">' + (d.layanan||'-') + '</span></div>' +
      '<div class="hdr-right">' + expLogo + '</div>' +
    '</div>' +

    '<div class="sec">' +
      '<div class="lbl">Pengirim</div>' +
      '<div class="vb">' + (d.namaPengirim||'-') + '</div>' +
      '<div class="vn">' + (d.alamatPengirim||'-') + '</div>' +
      '<div class="vn">Telp: ' + (d.noHpPengirim||'-') + '</div>' +
    '</div>' +

    '<div class="sec alt">' +
      '<div class="lbl">Penerima</div>' +
      '<div class="vb" style="font-size:20px;line-height:1.15">' + (d.namaPenerima||'-') + '</div>' +
      '<div class="vn" style="font-size:12px">' + (d.alamatPenerima||'-') + '</div>' +
      '<div class="vb">Telp: ' + (d.noHpPenerima||'-') + '</div>' +
    '</div>' +

    '<div class="row2">' +
      '<div class="c1"><div class="lbl">Tanggal</div><div class="vb" style="font-size:11px">' + tgl + '</div></div>' +
      '<div class="c2"><div class="lbl">Berat</div><div class="vb">' + (d.berat||'-') + ' Kg</div></div>' +
    '</div>' +

    '<div class="sec flow">' +
      '<div class="lbl">Detail Produk</div>' +
      '<table>' +
        '<thead><tr><th>Nama Produk</th><th style="text-align:center">SKU</th><th style="text-align:center">Qty</th></tr></thead>' +
        '<tbody>' + produkRows + '</tbody>' +
      '</table>' +
    '</div>' +

    catatanSection +

  '</div>' +

  '<div class="print-hint" style="text-align:center;padding:20px;">' +
    '<button onclick="window.print()" style="padding:10px 20px; font-weight:bold; cursor:pointer;">Cetak Resi</button>' +
  '</div>' +

  '</body></html>';
}

// ── Preview → Tab Baru + Auto Print ──────────────────────────────
function doPreview() {
  var d = collectData();
  if (!validate(d)) return;
  saveFormState();
  try {
    var html = buildResiHTML(d);
    var w = window.open('', '_blank');
    if (!w) { showToast('Popup diblokir browser. Izinkan popup untuk tab ini.', 'error'); return; }
    w.document.open();
    w.document.write(html);
    w.document.close();
    setTimeout(function(){ stampPages(w); w.print(); }, 350);
  } catch(e) {
    showToast('Error: ' + e.message, 'error');
  }
}

// ── Generate PDF ──────────────────────────────────────────────────
function doGenerate() {
  var d = collectData();
  if (!validate(d)) return;
  saveFormState();
  try {
    var html = buildResiHTML(d);
    var w = window.open('', '_blank');
    if (!w) { showToast('Popup diblokir browser. Izinkan popup untuk tab ini.', 'error'); return; }
    w.document.open();
    w.document.write(html);
    w.document.close();
    setTimeout(function(){ stampPages(w); w.print(); }, 350);
  } catch(e) {
    showToast('Error: ' + e.message, 'error');
  }
}

// Tempel 1 footer fixed (diulang otomatis tiap halaman saat print oleh browser).
// Fixed = keluar dari flow, tidak merusak tata letak produk.
function stampPages(w) {
  try {
    var months = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
    var now = new Date();
    var tgl = now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();
    var old = w.document.querySelectorAll('.ftr-print');
    for (var i = 0; i < old.length; i++) old[i].parentNode.removeChild(old[i]);
    var el = w.document.createElement('div');
    el.className = 'ftr-print';
    el.innerHTML = 'SUPERSUB &bull; Terima Kasih Telah Berbelanja! &bull; ' + tgl;
    w.document.body.appendChild(el);
  } catch(e) {}
}

// ── Reset ─────────────────────────────────────────────────────────
function resetForm() {
  ['resellerNama','resellerHp','resellerAlamat',
   'namaPenerima','noHpPenerima','alamatPenerima',
   'berat','catatan'].forEach(function(id){
    var el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('productList').innerHTML = '';
  productCount = 0;
  addProduct();
  setMode('default');
  document.getElementById('resultArea').innerHTML = '';
  document.querySelectorAll('.eksp-btn').forEach(function(b,i){ b.classList.toggle('active', i===0); });
  document.querySelectorAll('.pill').forEach(function(p,i){ p.classList.toggle('active', i===0); });
  selectedEksp = 'JNE'; selectedLayanan = 'Reguler';
  clearSavedState();
  showToast('Form direset.', 'info');
}

// ── Helpers ─────────────────────────────────────────────────────
function setBtnState(id, loading, html) {
  var btn = document.getElementById(id);
  btn.disabled  = loading;
  btn.innerHTML = html;
}
var _tt;
function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.innerHTML = (type==='success'?'OK':type==='error'?'ERR':'INFO') + ' ' + msg;
  t.className = 'toast ' + type + ' show';
  clearTimeout(_tt);
  _tt = setTimeout(function(){ t.classList.remove('show'); }, 3400);
}

function toggleTheme() {
  var cur = document.documentElement.getAttribute('data-theme') || 'light';
  document.documentElement.setAttribute('data-theme', cur === 'dark' ? 'light' : 'dark');
}

window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'SET_THEME') {
    document.documentElement.setAttribute('data-theme', e.data.theme);
  }
});
</script>
