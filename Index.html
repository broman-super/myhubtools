<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Hub Tools | Dashboard</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { text-align: center; background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 80%; max-width: 500px; }
        h1 { color: #333; }
        p { color: #666; margin-bottom: 2rem; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .tool-btn { padding: 15px; background: #2ea44f; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        .tool-btn:hover { background: #22863a; transform: translateY(-3px); }
        .coming-soon { background: #ddd; color: #888; pointer-events: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>My Hub Tools</h1>
    <p>Kumpulan Tools Pagawean Broman-Super</p>
    
    <div class="btn-grid">
        <a href="#" class="tool-btn">Tool Audit (Nanti)</a>
        <a href="#" class="tool-btn">Tool Inventory (Nanti)</a>
        <a href="#" class="tool-btn coming-soon">Tool 3</a>
        <a href="#" class="tool-btn coming-soon">Tool 4</a>
    </div>

    <footer style="margin-top: 30px; font-size: 0.8rem; color: #aaa;">
        Dibuat dengan ❤️ & Apps Script
    </footer>
</div>

</body>
</html>
